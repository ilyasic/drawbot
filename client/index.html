<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Draw & Guess</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
:root{
  --bg:#0c0c14;--surface:#161622;--surface2:#1e1e30;--border:#2a2a42;
  --accent:#7c6ff7;--accent2:#ff6b8a;--green:#3dd68c;
  --text:#e2e2f0;--text2:#7777aa;--r:10px;--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--text);font-family:'Nunito',sans-serif;touch-action:none;}
#app{display:flex;flex-direction:column;height:100dvh;}

/* Topbar */
#topbar{display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;min-height:44px;}
#word-display{flex:1;text-align:center;font-size:.88rem;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--accent);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#role-pill{font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:20px;
  background:var(--surface2);color:var(--text2);text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
#role-pill.drawer{background:rgba(124,111,247,.2);color:var(--accent);}
#role-pill.guesser{background:rgba(255,107,138,.18);color:var(--accent2);}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}

/* Canvas */
#canvas-outer{flex:1;position:relative;overflow:hidden;background:#1a1a1a;cursor:crosshair;}
#canvas-inner{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
.cvl{position:absolute;top:0;left:0;}
#cv-bg{background:#fff;z-index:1;}
#cv-l1{z-index:2;}#cv-l2{z-index:3;}#cv-l3{z-index:4;}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:5px;
  padding:7px 8px calc(7px + var(--sb));
  background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;z-index:20;}
#toolbar::-webkit-scrollbar{display:none;}
.tbtn{width:40px;height:40px;border-radius:var(--r);border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.tbtn:active{transform:scale(.9);}
.tbtn.on{border-color:var(--accent);background:rgba(124,111,247,.18);color:var(--accent);}
.tbtn.gbtn{border-color:var(--green);background:rgba(61,214,140,.12);color:var(--green);}
.sep{width:1px;height:28px;background:var(--border);flex-shrink:0;}
.cdot{width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;
  cursor:pointer;flex-shrink:0;transition:transform .12s;}
.cdot:active{transform:scale(.85);}
.cdot.on{border-color:#fff;transform:scale(1.18);}
#sz-wrap{display:flex;align-items:center;gap:6px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:var(--r);padding:0 8px;height:40px;flex-shrink:0;}
#sz-range{-webkit-appearance:none;width:76px;height:3px;border-radius:2px;
  background:var(--border);outline:none;}
#sz-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);border:2px solid #fff;cursor:pointer;}
#sz-dot{width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
#zoom-lbl{font-size:.7rem;color:var(--text2);font-weight:800;white-space:nowrap;
  flex-shrink:0;min-width:34px;text-align:center;}

/* Panels */
.panel{position:absolute;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:8px;z-index:30;display:none;flex-direction:column;
  gap:5px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.panel.open{display:flex;}
#brush-panel{left:8px;top:52px;min-width:130px;}
#layer-panel{right:8px;top:52px;min-width:148px;}
#settings-panel{left:50%;top:52px;transform:translateX(-50%);min-width:190px;}
.brush-opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;
  cursor:pointer;font-size:.82rem;font-weight:700;border:1.5px solid transparent;}
.brush-opt.on{border-color:var(--accent);background:rgba(124,111,247,.12);}
.brush-opt:hover{background:var(--surface2);}
.bi{font-size:1rem;width:20px;text-align:center;}
.panel-title{font-size:.72rem;color:var(--text2);font-weight:800;padding:0 2px 3px;}
.lrow{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;
  cursor:pointer;font-size:.82rem;font-weight:700;border:1.5px solid transparent;}
.lrow.al{border-color:var(--accent);background:rgba(124,111,247,.1);}
.lrow:hover{background:var(--surface2);}
.lvis{font-size:.85rem;cursor:pointer;opacity:.35;transition:opacity .15s;}
.lvis.sv{opacity:1;}
.lname{flex:1;}
.lthumb{width:28px;height:18px;border-radius:3px;border:1px solid var(--border);
  background:#fff;overflow:hidden;flex-shrink:0;}
.lthumb canvas{width:100%;height:100%;}
.panel label{font-size:.78rem;color:var(--text2);font-weight:700;}
.panel select{background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:6px;font-size:.83rem;
  font-family:'Nunito',sans-serif;width:100%;}
.panel-btn{background:var(--accent);color:#fff;border:none;padding:8px;
  border-radius:6px;font-size:.83rem;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;width:100%;}
.panel-btn.sm{background:var(--surface2);color:var(--text2);border:1px solid var(--border);
  font-size:.75rem;padding:5px;}

/* Chat & Guess */
#chat-log{max-height:0;overflow:hidden;background:var(--surface);transition:max-height .25s;flex-shrink:0;}
#chat-log.open{max-height:96px;overflow-y:auto;border-top:1px solid var(--border);}
#chat-log::-webkit-scrollbar{width:2px;}
#chat-log::-webkit-scrollbar-thumb{background:var(--border);}
.cmsg{padding:3px 12px;font-size:.79rem;color:var(--text2);}
.cmsg .cn{color:var(--text);font-weight:700;}
.cmsg.ok{color:var(--green);}
.cmsg.sys{color:var(--accent);font-style:italic;}
#guess-row{display:none;align-items:center;gap:7px;
  padding:7px 10px calc(7px + var(--sb));
  background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;z-index:20;}
#guess-in{flex:1;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text);padding:9px 13px;font-size:.9rem;
  outline:none;font-family:'Nunito',sans-serif;}
#guess-in:focus{border-color:var(--accent);}
#guess-go{background:var(--accent);color:#fff;border:none;padding:9px 16px;
  border-radius:var(--r);font-size:.88rem;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;}

/* Toast */
#toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:var(--surface2);color:var(--text);padding:8px 18px;border-radius:30px;
  font-size:.83rem;font-weight:700;border:1px solid var(--border);opacity:0;
  transition:all .25s;z-index:100;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:rgba(61,214,140,.2);border-color:var(--green);color:var(--green);}

/* Join overlay */
#join-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(10px);}
#join-box{background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:28px 22px;width:min(310px,90vw);
  display:flex;flex-direction:column;gap:14px;}
#join-box h2{text-align:center;font-size:1.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#join-box input{background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text);padding:11px 14px;font-size:.95rem;
  outline:none;font-family:'Nunito',sans-serif;}
#join-box input:focus{border-color:var(--accent);}
#join-btn{background:linear-gradient(135deg,var(--accent),#9d96ff);color:#fff;
  border:none;padding:13px;border-radius:var(--r);font-size:.95rem;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;}

/* Round result */
#round-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:none;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(6px);}
#round-overlay.show{display:flex;}
#round-box{background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:26px 22px;text-align:center;width:min(290px,86vw);}
#round-box .re{font-size:2.6rem;margin-bottom:6px;}
#round-box h3{font-size:1.2rem;font-weight:800;margin-bottom:4px;}
#round-box .rw{font-size:1.5rem;font-weight:800;color:var(--accent);margin:10px 0;}
#round-box p{color:var(--text2);font-size:.85rem;}
</style>
</head>
<body>
<div id="app">
  <div id="join-overlay">
    <div id="join-box">
      <h2>🎨 Draw & Guess</h2>
      <input id="name-in" placeholder="Your name" maxlength="24" autocomplete="off"/>
      <input id="room-in" placeholder="Room ID" maxlength="60" autocomplete="off"/>
      <button id="join-btn">Join Game →</button>
    </div>
  </div>

  <div id="round-overlay">
    <div id="round-box">
      <div class="re" id="re-emoji">🎉</div>
      <h3 id="re-title"></h3>
      <div class="rw" id="re-word"></div>
      <p id="re-sub"></p>
    </div>
  </div>

  <div id="brush-panel" class="panel">
    <div class="panel-title">BRUSH TYPE</div>
    <div class="brush-opt on" data-brush="pen">   <span class="bi">🖊</span>Pen</div>
    <div class="brush-opt"    data-brush="pencil"><span class="bi">✏️</span>Pencil</div>
    <div class="brush-opt"    data-brush="marker"><span class="bi">🖍</span>Marker</div>
    <div class="brush-opt"    data-brush="eraser"><span class="bi">🧽</span>Eraser</div>
  </div>

  <div id="layer-panel" class="panel">
    <div class="panel-title">LAYERS</div>
    <div class="lrow al" data-layer="3">
      <span class="lvis sv" data-lv="3">👁</span><span class="lname">Layer 3</span>
      <div class="lthumb"><canvas id="lt3"></canvas></div>
    </div>
    <div class="lrow" data-layer="2">
      <span class="lvis sv" data-lv="2">👁</span><span class="lname">Layer 2</span>
      <div class="lthumb"><canvas id="lt2"></canvas></div>
    </div>
    <div class="lrow" data-layer="1">
      <span class="lvis sv" data-lv="1">👁</span><span class="lname">Layer 1</span>
      <div class="lthumb"><canvas id="lt1"></canvas></div>
    </div>
    <button id="merge-btn" class="panel-btn sm">Merge All Layers</button>
  </div>

  <div id="settings-panel" class="panel">
    <div class="panel-title">CANVAS SETTINGS</div>
    <label>Canvas Size</label>
    <select id="canvas-size-sel">
      <option value="640x360">640 × 360</option>
      <option value="800x500" selected>800 × 500</option>
      <option value="1024x640">1024 × 640</option>
      <option value="1280x720">1280 × 720 (HD)</option>
    </select>
    <button id="apply-size-btn" class="panel-btn">Apply Size</button>
  </div>

  <div id="topbar">
    <div id="conn-dot"></div>
    <div id="word-display">connecting…</div>
    <span id="role-pill">—</span>
    <button class="tbtn" id="btn-settings" style="width:32px;height:32px;font-size:.85rem;">⚙️</button>
  </div>

  <div id="canvas-outer">
    <div id="canvas-inner">
      <canvas id="cv-bg" class="cvl"></canvas>
      <canvas id="cv-l1" class="cvl"></canvas>
      <canvas id="cv-l2" class="cvl"></canvas>
      <canvas id="cv-l3" class="cvl"></canvas>
    </div>
  </div>

  <div id="chat-log"></div>

  <div id="toolbar">
    <div id="palette" style="display:flex;gap:4px;align-items:center;"></div>
    <div class="sep"></div>
    <button class="tbtn on" id="btn-brush" title="Brush">🖊</button>
    <button class="tbtn" id="btn-layers" title="Layers">📋</button>
    <div class="sep"></div>
    <div id="sz-wrap">
      <div id="sz-dot"></div>
      <input type="range" id="sz-range" min="1" max="80" value="8"/>
    </div>
    <div class="sep"></div>
    <button class="tbtn" id="btn-undo">↩️</button>
    <button class="tbtn" id="btn-redo">↪️</button>
    <button class="tbtn" id="btn-clear" style="font-size:.85rem;">🗑</button>
    <div class="sep"></div>
    <button class="tbtn" id="btn-zoom-out" style="font-size:1.1rem;font-weight:800;">−</button>
    <span id="zoom-lbl">100%</span>
    <button class="tbtn" id="btn-zoom-in"  style="font-size:1.1rem;font-weight:800;">+</button>
    <button class="tbtn" id="btn-zoom-fit" style="font-size:.65rem;font-weight:800;">FIT</button>
    <div class="sep"></div>
    <button class="tbtn gbtn" id="btn-done">✅</button>
  </div>

  <div id="guess-row">
    <input id="guess-in" placeholder="Type your guess…" autocomplete="off" autocorrect="off" autocapitalize="off"/>
    <button id="guess-go">Send</button>
  </div>
</div>
<div id="toast"></div>

<script>
(function(){
'use strict';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

// ── Canvas state ──────────────────────────────────────────────────────────────
let CW=800,CH=500;
const LAYERS={bg:document.getElementById('cv-bg'),1:document.getElementById('cv-l1'),
  2:document.getElementById('cv-l2'),3:document.getElementById('cv-l3')};
const CTX={};
const layerVis={1:true,2:true,3:true};
let activeLayer=3;

function initCanvases(){
  Object.entries(LAYERS).forEach(([k,c])=>{
    c.width=CW;c.height=CH;
    c.style.width=CW+'px';c.style.height=CH+'px';
    CTX[k]=c.getContext('2d');
  });
  CTX.bg.fillStyle='#fff';CTX.bg.fillRect(0,0,CW,CH);
  fitCanvas();
}
function actCtx(){return CTX[activeLayer];}

// ── Zoom/pan ──────────────────────────────────────────────────────────────────
let zoom=1,panX=0,panY=0;
const inner=document.getElementById('canvas-inner');
const outer=document.getElementById('canvas-outer');

function applyT(){
  inner.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';
}
function fitCanvas(){
  const ow=outer.clientWidth,oh=outer.clientHeight;
  zoom=Math.min(ow/CW,oh/CH,1);
  panX=(ow-CW*zoom)/2;panY=(oh-CH*zoom)/2;
  applyT();
}
window.addEventListener('resize',fitCanvas);

function zoomAt(delta,cx,cy){
  const r=outer.getBoundingClientRect();
  const ox=cx-r.left,oy=cy-r.top;
  const nz=Math.max(0.15,Math.min(8,zoom*delta));
  panX=ox-(ox-panX)*(nz/zoom);
  panY=oy-(oy-panY)*(nz/zoom);
  zoom=nz;applyT();
}

// Ctrl+scroll
outer.addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){
    e.preventDefault();
    zoomAt(e.deltaY<0?1.12:0.89,e.clientX,e.clientY);
  }
},{passive:false});

// Pinch zoom
let pinching=false,lastPinchD=0,lastPinchM=null;
outer.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinching=true;
    lastPinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY);
    lastPinchM={x:(e.touches[0].clientX+e.touches[1].clientX)/2,
      y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    e.preventDefault();
  }
},{passive:false});
outer.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinching){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY);
    const m={x:(e.touches[0].clientX+e.touches[1].clientX)/2,
      y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    if(lastPinchD>0) zoomAt(d/lastPinchD,m.x,m.y);
    panX+=m.x-lastPinchM.x;panY+=m.y-lastPinchM.y;
    lastPinchD=d;lastPinchM=m;applyT();
  }
},{passive:false});
outer.addEventListener('touchend',e=>{if(e.touches.length<2)pinching=false;});

document.getElementById('btn-zoom-in').addEventListener('click',()=>{
  const r=outer.getBoundingClientRect();
  zoomAt(1.25,r.left+r.width/2,r.top+r.height/2);
});
document.getElementById('btn-zoom-out').addEventListener('click',()=>{
  const r=outer.getBoundingClientRect();
  zoomAt(0.8,r.left+r.width/2,r.top+r.height/2);
});
document.getElementById('btn-zoom-fit').addEventListener('click',fitCanvas);

// Canvas coords (zoom-aware)
function getXY(e){
  const r=outer.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return[(s.clientX-r.left-panX)/zoom,(s.clientY-r.top-panY)/zoom];
}

// ── Drawing ───────────────────────────────────────────────────────────────────
let drawing=false,lx=0,ly=0;
let brushType='pen',color='#1a1a2e',brushSize=8;
let undoStack=[],redoStack=[];

const BRUSHES={
  pen:   {op:'source-over',alpha:1,   lw:1,   blur:0},
  pencil:{op:'source-over',alpha:0.6, lw:0.8, blur:0.4},
  marker:{op:'source-over',alpha:0.4, lw:2.5, blur:0},
  eraser:{op:'destination-out',alpha:1,lw:1,  blur:0},
};

function applyBS(ctx,c,s,bt){
  const b=BRUSHES[bt||brushType]||BRUSHES.pen;
  ctx.globalCompositeOperation=b.op;
  ctx.globalAlpha=b.alpha;
  ctx.strokeStyle=b.op==='destination-out'?'rgba(0,0,0,1)':c;
  ctx.lineWidth=s*b.lw;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.filter=b.blur?`blur(${b.blur}px)`:'none';
}
function resetBS(ctx){ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.filter='none';}

function drawSeg(ctx,x1,y1,x2,y2,c,s,bt){
  applyBS(ctx,c,s,bt);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  resetBS(ctx);
}

function renderStroke(stroke,tCtx){
  const ctx=tCtx||CTX[stroke.layer||activeLayer]||actCtx();
  const pts=stroke.points||[];
  if(!pts.length)return;
  const bt=stroke.brush||'pen';
  applyBS(ctx,stroke.color||'#000',stroke.size||8,bt);
  ctx.beginPath();
  if(pts.length===1){
    ctx.arc(pts[0][0],pts[0][1],(stroke.size||8)/2,0,Math.PI*2);
    ctx.fill();
  } else {
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke();
  }
  resetBS(ctx);
}

// Undo/Redo
function saveUndo(){
  const s={};[1,2,3].forEach(n=>s[n]=CTX[n].getImageData(0,0,CW,CH));
  undoStack.push(s);if(undoStack.length>40)undoStack.shift();redoStack=[];
}
function doUndo(){
  if(!undoStack.length)return;
  const c={};[1,2,3].forEach(n=>c[n]=CTX[n].getImageData(0,0,CW,CH));
  redoStack.push(c);const s=undoStack.pop();
  [1,2,3].forEach(n=>CTX[n].putImageData(s[n],0,0));
  sendSnap();updateThumbs();
}
function doRedo(){
  if(!redoStack.length)return;
  const c={};[1,2,3].forEach(n=>c[n]=CTX[n].getImageData(0,0,CW,CH));
  undoStack.push(c);const s=redoStack.pop();
  [1,2,3].forEach(n=>CTX[n].putImageData(s[n],0,0));
  sendSnap();updateThumbs();
}

// Merge to PNG for server
function getMerged(){
  const t=document.createElement('canvas');t.width=CW;t.height=CH;
  const tc=t.getContext('2d');tc.fillStyle='#fff';tc.fillRect(0,0,CW,CH);
  [1,2,3].forEach(n=>{if(layerVis[n])tc.drawImage(LAYERS[n],0,0);});
  return t.toDataURL('image/png');
}
function sendSnap(){ws?.send(JSON.stringify({type:'snapshot',data:getMerged()}));}

// Layer thumbnails
function updateThumbs(){
  [1,2,3].forEach(n=>{
    const th=document.getElementById(`lt${n}`);if(!th)return;
    th.width=28;th.height=18;
    const tc=th.getContext('2d');tc.fillStyle='#fff';tc.fillRect(0,0,28,18);
    tc.drawImage(LAYERS[n],0,0,28,18);
  });
}

// ── Color palette ─────────────────────────────────────────────────────────────
const COLORS=['#1a1a2e','#ffffff','#ff3855','#ff8c42','#ffd60a',
  '#06d6a0','#0077b6','#7b2d8b','#ff6b8a','#8b4513',
  '#adb5bd','#4cc9f0','#7c6ff7','#f72585','#2dc653'];
const palette=document.getElementById('palette');
COLORS.forEach(c=>{
  const d=document.createElement('div');
  d.className='cdot'+(c===color?' on':'');
  d.style.background=c;
  if(c==='#ffffff')d.style.border='2.5px solid #555';
  d.addEventListener('pointerdown',()=>{
    document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('on'));
    d.classList.add('on');color=c;
    if(brushType==='eraser'){brushType='pen';updateBrushUI();}
    updateSzDot();
  });
  palette.appendChild(d);
});

function updateSzDot(){
  const s=Math.max(3,Math.min(brushSize,22));
  document.getElementById('sz-dot').innerHTML=
    `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${brushType==='eraser'?'#888':color};"></div>`;
}
document.getElementById('sz-range').addEventListener('input',e=>{brushSize=+e.target.value;updateSzDot();});
updateSzDot();

// ── Brush panel ───────────────────────────────────────────────────────────────
const brushPanel=document.getElementById('brush-panel');
const layerPanel=document.getElementById('layer-panel');
const settingsPanel=document.getElementById('settings-panel');

document.getElementById('btn-brush').addEventListener('click',()=>{
  brushPanel.classList.toggle('open');
  layerPanel.classList.remove('open');settingsPanel.classList.remove('open');
});
document.querySelectorAll('.brush-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.brush-opt').forEach(x=>x.classList.remove('on'));
    el.classList.add('on');brushType=el.dataset.brush;
    document.getElementById('btn-brush').textContent=el.querySelector('.bi').textContent;
    updateSzDot();brushPanel.classList.remove('open');
  });
});
function updateBrushUI(){
  document.querySelectorAll('.brush-opt').forEach(x=>x.classList.remove('on'));
  document.querySelector(`.brush-opt[data-brush="${brushType}"]`)?.classList.add('on');
  updateSzDot();
}

// ── Layer panel ───────────────────────────────────────────────────────────────
document.getElementById('btn-layers').addEventListener('click',()=>{
  layerPanel.classList.toggle('open');
  brushPanel.classList.remove('open');settingsPanel.classList.remove('open');
  updateThumbs();
});
document.querySelectorAll('.lrow').forEach(el=>{
  el.addEventListener('click',e=>{
    if(e.target.classList.contains('lvis'))return;
    document.querySelectorAll('.lrow').forEach(x=>x.classList.remove('al'));
    el.classList.add('al');activeLayer=+el.dataset.layer;
  });
});
document.querySelectorAll('.lvis').forEach(el=>{
  el.addEventListener('click',e=>{
    e.stopPropagation();const n=+el.dataset.lv;
    layerVis[n]=!layerVis[n];
    LAYERS[n].style.opacity=layerVis[n]?'1':'0';
    el.classList.toggle('sv',layerVis[n]);
  });
});
document.getElementById('merge-btn').addEventListener('click',()=>{
  saveUndo();
  const t=document.createElement('canvas');t.width=CW;t.height=CH;
  const tc=t.getContext('2d');
  [1,2,3].forEach(n=>tc.drawImage(LAYERS[n],0,0));
  CTX[1].clearRect(0,0,CW,CH);CTX[1].drawImage(t,0,0);
  [2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
  activeLayer=1;
  document.querySelectorAll('.lrow').forEach(x=>x.classList.remove('al'));
  document.querySelector('.lrow[data-layer="1"]')?.classList.add('al');
  showToast('Layers merged');updateThumbs();layerPanel.classList.remove('open');
});

// ── Settings panel ────────────────────────────────────────────────────────────
document.getElementById('btn-settings').addEventListener('click',()=>{
  settingsPanel.classList.toggle('open');
  brushPanel.classList.remove('open');layerPanel.classList.remove('open');
});
document.getElementById('apply-size-btn').addEventListener('click',()=>{
  const[w,h]=document.getElementById('canvas-size-sel').value.split('x').map(Number);
  const saved={};[1,2,3].forEach(n=>saved[n]=LAYERS[n].toDataURL());
  CW=w;CH=h;initCanvases();
  [1,2,3].forEach(n=>{const img=new Image();img.src=saved[n];
    img.onload=()=>CTX[n].drawImage(img,0,0,CW,CH);});
  settingsPanel.classList.remove('open');showToast(`Canvas: ${w}×${h}`);
});

// Close panels on outside click
document.addEventListener('pointerdown',e=>{
  if(!e.target.closest('#brush-panel,#btn-brush'))brushPanel.classList.remove('open');
  if(!e.target.closest('#layer-panel,#btn-layers'))layerPanel.classList.remove('open');
  if(!e.target.closest('#settings-panel,#btn-settings'))settingsPanel.classList.remove('open');
});

// ── Drawing events ────────────────────────────────────────────────────────────
let curStroke=null;
function onStart(e){
  if(!isDrawer||pinching)return;
  if(e.touches?.length>1)return;
  e.preventDefault();
  drawing=true;saveUndo();[lx,ly]=getXY(e);
  curStroke={brush:brushType,color:brushType==='eraser'?null:color,
    size:brushSize,layer:activeLayer,points:[[lx,ly]]};
}
function onMove(e){
  if(!drawing||!isDrawer||pinching)return;
  if(e.touches?.length>1)return;
  e.preventDefault();
  const[x,y]=getXY(e);
  drawSeg(actCtx(),lx,ly,x,y,color,brushSize);
  curStroke.points.push([x,y]);lx=x;ly=y;
}
function onEnd(){
  if(!drawing)return;drawing=false;
  if(curStroke&&ws?.readyState===1)ws.send(JSON.stringify({type:'draw',stroke:curStroke}));
  curStroke=null;updateThumbs();
}
outer.addEventListener('pointerdown',onStart,{passive:false});
outer.addEventListener('pointermove',onMove,{passive:false});
outer.addEventListener('pointerup',onEnd);
outer.addEventListener('pointercancel',onEnd);

// Toolbar
document.getElementById('btn-undo').addEventListener('click',()=>{if(isDrawer)doUndo();});
document.getElementById('btn-redo').addEventListener('click',()=>{if(isDrawer)doRedo();});
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!isDrawer)return;saveUndo();
  [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
  redoStack=[];ws?.send(JSON.stringify({type:'clear'}));updateThumbs();
});
document.getElementById('btn-done').addEventListener('click',()=>{
  if(!isDrawer)return;
  if(confirm('Finish drawing?'))ws?.send(JSON.stringify({type:'done_drawing'}));
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastT=null;const toastEl=document.getElementById('toast');
function showToast(msg,cls=''){
  toastEl.textContent=msg;toastEl.className='show '+cls;
  clearTimeout(toastT);toastT=setTimeout(()=>{toastEl.className='';},3000);
}

// ── Chat ──────────────────────────────────────────────────────────────────────
const chatLog=document.getElementById('chat-log');
function addChat(cls,html){
  const d=document.createElement('div');d.className='cmsg '+cls;d.innerHTML=html;
  chatLog.appendChild(d);chatLog.scrollTop=chatLog.scrollHeight;chatLog.classList.add('open');
}

// ── Round result ──────────────────────────────────────────────────────────────
const roundOverlay=document.getElementById('round-overlay');
function showResult(emoji,title,word,sub){
  document.getElementById('re-emoji').textContent=emoji;
  document.getElementById('re-title').textContent=title;
  document.getElementById('re-word').textContent=word;
  document.getElementById('re-sub').textContent=sub;
  roundOverlay.classList.add('show');
  setTimeout(()=>roundOverlay.classList.remove('show'),4500);
}

// ── Role ──────────────────────────────────────────────────────────────────────
let isDrawer=true;
function setRole(role,wordOrLen){
  isDrawer=role==='drawer';
  document.getElementById('toolbar').style.display=isDrawer?'flex':'none';
  document.getElementById('guess-row').style.display=isDrawer?'none':'flex';
  const pill=document.getElementById('role-pill');
  pill.className='role-pill '+(isDrawer?'drawer':'guesser');
  pill.textContent=isDrawer?'DRAWING':'GUESSING';
  if(isDrawer){
    document.getElementById('word-display').textContent=`Draw: ${wordOrLen}`;
    document.getElementById('word-display').style.color='var(--green)';
    showToast(`🖌 Draw: ${wordOrLen}`);undoStack=[];redoStack=[];
  } else {
    const hint=Array(+wordOrLen).fill('_').join(' ');
    document.getElementById('word-display').textContent=hint;
    document.getElementById('word-display').style.color='var(--accent)';
    showToast(`🤔 Guess! ${wordOrLen} letters`);
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws=null,myName='',myRoom='';
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws?room=${encodeURIComponent(myRoom)}&name=${encodeURIComponent(myName)}`);
  ws.onopen=()=>document.getElementById('conn-dot').style.background='var(--green)';
  ws.onmessage=({data})=>{
    let m;try{m=JSON.parse(data);}catch{return;}
    switch(m.type){
      case 'init':
        [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
        (m.strokes||[]).forEach(s=>renderStroke(s,CTX[s.layer||3]));
        document.getElementById('word-display').textContent=`${m.players} players`;
        break;
      case 'draw':
        renderStroke(m.stroke,CTX[m.stroke.layer||activeLayer]);updateThumbs();break;
      case 'clear':
        [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
        undoStack=[];redoStack=[];updateThumbs();break;
      case 'snapshot':
        const img=new Image();img.onload=()=>{
          [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
          CTX[1].drawImage(img,0,0,CW,CH);updateThumbs();};img.src=m.data;break;
      case 'role':
        setRole(m.role,m.role==='drawer'?m.word:m.hint);
        [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
        undoStack=[];redoStack=[];updateThumbs();break;
      case 'guess':
        addChat(m.correct?'ok':'',`<span class="cn">${m.name}:</span> ${m.text}${m.correct?' ✅':''}`);
        if(m.correct)showToast(`🎉 ${m.name} got it!`,'ok');break;
      case 'round_end':
        showResult(m.guesser?'🎉':'⏰',
          m.guesser?`${m.guesser} guessed it!`:'Round Over',
          m.word,m.guesser?`Artist: ${m.drawerName}`:`Word was: ${m.word}`);break;
      case 'status':
        document.getElementById('word-display').textContent=m.message;
        addChat('sys',m.message);break;
      case 'player_joined':case 'player_left':
        addChat('sys',m.type==='player_joined'?`${m.name} joined`:`${m.name} left`);break;
    }
  };
  ws.onclose=()=>{document.getElementById('conn-dot').style.background='#ff3855';setTimeout(connect,2500);};
  ws.onerror=()=>ws.close();
}

// ── Guess ─────────────────────────────────────────────────────────────────────
function sendGuess(){
  const t=document.getElementById('guess-in').value.trim();
  if(!t||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:'guess',text:t}));
  document.getElementById('guess-in').value='';
}
document.getElementById('guess-go').addEventListener('click',sendGuess);
document.getElementById('guess-in').addEventListener('keydown',e=>{if(e.key==='Enter')sendGuess();});

// ── Join ──────────────────────────────────────────────────────────────────────
const joinOverlay=document.getElementById('join-overlay');
function doJoin(){
  myName=document.getElementById('name-in').value.trim()||`Player${Math.floor(Math.random()*1000)}`;
  myRoom=document.getElementById('room-in').value.trim()||'default';
  joinOverlay.style.display='none';
  initCanvases();connect();
}
document.getElementById('join-btn').addEventListener('click',doJoin);
document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('room-in').focus();});
document.getElementById('room-in').addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});

// ── Auto-join: detect room from every possible Telegram/URL source ────────────
//
// When launched as a Mini App via setChatMenuButton, Telegram passes the URL
// we set (PUBLIC_URL/?room=ROOMID). So ?room= is the primary source.
//
// tg.initDataUnsafe.start_param is only populated when opened via deep-link
// (t.me/bot?start=PARAM), NOT via Menu Button — so we can't rely on it alone.
//
// Priority order:
//   1. ?room= URL param        (Menu Button launch — most common)
//   2. tg.initDataUnsafe.start_param  (deep-link fallback)
//   3. ?startapp= param        (alternative Telegram param name)
//   4. Nothing found → show join screen so user can enter manually

// ── Auto-join ──────────────────────────────────────────────────────────────
// tg.initDataUnsafe is only guaranteed to be populated AFTER tg.ready() fires.
// We poll briefly to catch the case where the Mini App data arrives slightly late.
function getAutoJoinData() {
  const usp = new URLSearchParams(location.search);

  // Priority 1: tg.initDataUnsafe.start_param (from ?startapp= or setChatMenuButton)
  let roomId = '';
  if (tg) {
    const sp = tg.initDataUnsafe?.start_param;
    if (sp) roomId = decodeURIComponent(sp);
  }

  // Priority 2: ?room= URL param (setChatMenuButton passes this in the URL)
  if (!roomId) roomId = usp.get('room') || '';

  // Priority 3: ?startapp= URL param fallback
  if (!roomId) roomId = usp.get('startapp') || '';

  // Decode if double-encoded
  if (roomId) try { roomId = decodeURIComponent(roomId); } catch {}

  // Player name from Telegram
  let playerName = '';
  if (tg) {
    const u = tg.initDataUnsafe?.user;
    if (u) playerName = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.username || '';
  }
  if (!playerName) playerName = `Player${Math.floor(Math.random() * 1000)}`;

  return { roomId, playerName };
}

function doAutoJoin(roomId, playerName) {
  document.getElementById('room-in').value  = roomId;
  document.getElementById('name-in').value  = playerName;
  document.getElementById('join-overlay').style.display = 'none';
  myName = playerName;
  myRoom = roomId;
  initCanvases();
  connect();
  console.log('[join] Auto-joined room=' + roomId + ' name=' + playerName);
}

(function tryAutoJoin(attempt) {
  const { roomId, playerName } = getAutoJoinData();

  if (roomId) {
    doAutoJoin(roomId, playerName);
    return;
  }

  // tg.initDataUnsafe may not be ready yet — retry up to 10x over 1s
  if (attempt < 10) {
    setTimeout(() => tryAutoJoin(attempt + 1), 100);
  } else {
    // Give up — show join screen with name pre-filled
    const { playerName: name } = getAutoJoinData();
    document.getElementById('name-in').value = name;
    console.log('[join] No room found after retries, showing join screen');
  }
})(0);
})();
</script>
