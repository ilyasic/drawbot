<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Draw & Guess</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --bg:#0c0c14;--surf:#161622;--surf2:#1e1e30;--bord:#2a2a42;
  --acc:#7c6ff7;--acc2:#ff6b8a;--grn:#3dd68c;--warn:#ffd60a;
  --txt:#e2e2f0;--txt2:#7777aa;--r:10px;--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--txt);font-family:'Nunito',sans-serif;touch-action:none;}
#app{display:flex;flex-direction:column;height:100dvh;}

/* ─ Topbar ─────────────────────────────────────────────────────────── */
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:var(--surf);border-bottom:1px solid var(--bord);
  flex-shrink:0;z-index:20;min-height:46px;}
#word-display{flex:1;text-align:center;font-size:.85rem;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--acc);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#timer-box{font-size:.78rem;font-weight:900;color:var(--grn);
  background:rgba(61,214,140,.12);border:1px solid rgba(61,214,140,.3);
  padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;transition:color .3s,background .3s;}
#timer-box.warn{color:var(--warn);background:rgba(255,214,10,.12);border-color:rgba(255,214,10,.3);}
#timer-box.danger{color:var(--acc2);background:rgba(255,107,138,.15);border-color:rgba(255,107,138,.4);}
#role-pill{font-size:.66rem;font-weight:800;padding:3px 9px;border-radius:20px;
  background:var(--surf2);color:var(--txt2);text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
#role-pill.drawer{background:rgba(124,111,247,.2);color:var(--acc);}
#role-pill.guesser{background:rgba(255,107,138,.18);color:var(--acc2);}
#conn-dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;transition:background .3s;}
#conn-dot.on{background:var(--grn);box-shadow:0 0 5px var(--grn);}

/* ─ Canvas ──────────────────────────────────────────────────────────── */
#canvas-outer{flex:1;position:relative;overflow:hidden;background:#222;}
#canvas-inner{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
.cvl{position:absolute;top:0;left:0;}
#cv-bg{background:#fff;z-index:1;}
#cv-l1{z-index:2;}#cv-l2{z-index:3;}#cv-l3{z-index:4;}

/* Guesser overlay on canvas */
#canvas-outer.guesser-mode{cursor:default;}
#guesser-overlay{
  display:none;position:absolute;inset:0;z-index:10;
  align-items:center;justify-content:center;pointer-events:none;
}
#canvas-outer.guesser-mode #guesser-overlay{display:flex;}

/* ─ Toolbar ─────────────────────────────────────────────────────────── */
#toolbar{display:flex;align-items:center;gap:5px;
  padding:7px 8px calc(7px + var(--sb));
  background:var(--surf);border-top:1px solid var(--bord);
  flex-shrink:0;overflow-x:auto;z-index:20;scrollbar-width:none;}
#toolbar::-webkit-scrollbar{display:none;}
/* Scroll fade hint */
#toolbar::after{content:'';position:sticky;right:0;width:20px;height:40px;
  background:linear-gradient(to left,var(--surf),transparent);flex-shrink:0;pointer-events:none;}
.tbtn{width:40px;height:40px;border-radius:var(--r);border:1.5px solid var(--bord);
  background:var(--surf2);color:var(--txt);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .12s,background .12s,transform .1s;flex-shrink:0;}
.tbtn:active{transform:scale(.88);}
.tbtn.on{border-color:var(--acc);background:rgba(124,111,247,.18);color:var(--acc);}
.tbtn.gbtn{border-color:var(--grn);background:rgba(61,214,140,.12);color:var(--grn);}
.tbtn.rbtn{border-color:var(--acc2);background:rgba(255,107,138,.12);color:var(--acc2);}
.sep{width:1px;height:28px;background:var(--bord);flex-shrink:0;}
.cdot{width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;
  cursor:pointer;flex-shrink:0;transition:transform .12s,border-color .12s;}
.cdot:active{transform:scale(.82);}
.cdot.on{border-color:#fff;box-shadow:0 0 0 2px var(--acc);transform:scale(1.15);}
#sz-wrap{display:flex;align-items:center;gap:6px;background:var(--surf2);
  border:1.5px solid var(--bord);border-radius:var(--r);padding:0 8px;height:40px;flex-shrink:0;}
#sz-range{-webkit-appearance:none;width:78px;height:3px;border-radius:2px;
  background:var(--bord);outline:none;}
#sz-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--acc);border:2px solid #fff;cursor:pointer;}
#sz-dot{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
#zoom-wrap{display:flex;align-items:center;gap:3px;flex-shrink:0;}
#zoom-lbl{font-size:.7rem;color:var(--txt2);font-weight:800;
  background:var(--surf2);border:1px solid var(--bord);
  border-radius:6px;padding:2px 6px;min-width:40px;text-align:center;}

/* ─ Panels ──────────────────────────────────────────────────────────── */
.panel{position:fixed;background:var(--surf);border:1px solid var(--bord);
  border-radius:var(--r);padding:8px;z-index:50;display:none;flex-direction:column;
  gap:5px;box-shadow:0 10px 40px rgba(0,0,0,.7);}
.panel.open{display:flex;}
#brush-panel{left:8px;bottom:calc(56px + var(--sb));min-width:130px;}
#layer-panel{right:8px;bottom:calc(56px + var(--sb));min-width:150px;}
#settings-panel{left:50%;bottom:calc(56px + var(--sb));transform:translateX(-50%);min-width:195px;}
.ptitle{font-size:.7rem;color:var(--txt2);font-weight:800;padding:0 2px 3px;letter-spacing:.06em;}
.bopt{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;
  cursor:pointer;font-size:.82rem;font-weight:700;border:1.5px solid transparent;
  transition:background .1s,border-color .1s;}
.bopt.on{border-color:var(--acc);background:rgba(124,111,247,.12);}
.bopt:active{background:var(--surf2);}
.bi{font-size:1rem;width:20px;text-align:center;}
.lrow{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;
  cursor:pointer;font-size:.82rem;font-weight:700;border:1.5px solid transparent;}
.lrow.al{border-color:var(--acc);background:rgba(124,111,247,.1);}
.lrow:active{background:var(--surf2);}
.lvis{font-size:.85rem;cursor:pointer;opacity:.3;transition:opacity .15s;user-select:none;}
.lvis.sv{opacity:1;}
.lname{flex:1;}
.lthumb{width:28px;height:18px;border-radius:3px;border:1px solid var(--bord);
  background:#fff;overflow:hidden;flex-shrink:0;}
.lthumb canvas{width:100%;height:100%;}
.panel label{font-size:.78rem;color:var(--txt2);font-weight:700;}
.panel select,.panel input[type=text]{background:var(--surf2);border:1px solid var(--bord);
  color:var(--txt);padding:7px 10px;border-radius:6px;font-size:.83rem;
  font-family:'Nunito',sans-serif;width:100%;outline:none;}
.pbtn{background:var(--acc);color:#fff;border:none;padding:8px;
  border-radius:6px;font-size:.83rem;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;width:100%;transition:opacity .15s;}
.pbtn:active{opacity:.8;}
.pbtn.sm{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord);font-size:.75rem;padding:5px;}

/* ─ Guess row ───────────────────────────────────────────────────────── */
#guess-area{display:none;flex-direction:column;background:var(--surf);
  border-top:1px solid var(--bord);flex-shrink:0;z-index:20;}
#chat-log{max-height:80px;overflow-y:auto;background:var(--surf);
  border-bottom:1px solid var(--bord);scrollbar-width:thin;}
#chat-log::-webkit-scrollbar{width:2px;}
#chat-log::-webkit-scrollbar-thumb{background:var(--bord);}
.cmsg{padding:3px 12px;font-size:.79rem;color:var(--txt2);}
.cmsg .cn{color:var(--txt);font-weight:700;}
.cmsg.ok{color:var(--grn);font-weight:700;}
.cmsg.sys{color:var(--acc);font-style:italic;}
#guess-row{display:flex;align-items:center;gap:7px;
  padding:7px 10px calc(7px + var(--sb));}
#guess-in{flex:1;background:var(--surf2);border:1.5px solid var(--bord);
  border-radius:var(--r);color:var(--txt);padding:9px 13px;font-size:.9rem;
  outline:none;font-family:'Nunito',sans-serif;transition:border-color .15s;}
#guess-in:focus{border-color:var(--acc);}
#guess-go{background:var(--acc);color:#fff;border:none;padding:9px 16px;
  border-radius:var(--r);font-size:.88rem;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;}
#hint-btn{background:rgba(255,214,10,.12);color:var(--warn);border:1px solid rgba(255,214,10,.3);
  padding:9px 12px;border-radius:var(--r);font-size:.8rem;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0;}
#hint-btn:disabled{opacity:.4;cursor:default;}

/* ─ Drawer chat (read-only) ─────────────────────────────────────────── */
#drawer-chat{display:none;max-height:70px;overflow-y:auto;
  background:var(--surf);border-top:1px solid var(--bord);
  flex-shrink:0;scrollbar-width:thin;}
#drawer-chat::-webkit-scrollbar{width:2px;}

/* ─ Toast ───────────────────────────────────────────────────────────── */
#toast{position:fixed;top:54px;left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:var(--surf2);color:var(--txt);
  padding:8px 18px;border-radius:30px;font-size:.83rem;font-weight:700;
  border:1px solid var(--bord);opacity:0;
  transition:all .25s;z-index:100;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:rgba(61,214,140,.2);border-color:var(--grn);color:var(--grn);}
#toast.bad{background:rgba(255,107,138,.15);border-color:var(--acc2);color:var(--acc2);}

/* ─ Custom confirm modal ────────────────────────────────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(6px);}
#modal-overlay.open{display:flex;}
#modal-box{background:var(--surf);border:1px solid var(--bord);border-radius:16px;
  padding:24px 20px;text-align:center;width:min(280px,86vw);display:flex;flex-direction:column;gap:14px;}
#modal-box p{color:var(--txt2);font-size:.9rem;}
#modal-box .mbtnrow{display:flex;gap:8px;}
#modal-box .mbtnrow button{flex:1;padding:10px;border-radius:var(--r);font-size:.88rem;
  font-weight:800;cursor:pointer;border:none;font-family:'Nunito',sans-serif;}
#modal-yes{background:var(--grn);color:#000;}
#modal-no{background:var(--surf2);color:var(--txt);border:1px solid var(--bord)!important;}

/* ─ Join overlay ────────────────────────────────────────────────────── */
#join-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(12px);}
#join-box{background:var(--surf);border:1px solid var(--bord);
  border-radius:18px;padding:28px 22px;width:min(310px,90vw);
  display:flex;flex-direction:column;gap:14px;}
#join-box h2{text-align:center;font-size:1.4rem;font-weight:900;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#join-box p{text-align:center;color:var(--txt2);font-size:.82rem;}
#join-box input{background:var(--surf2);border:1.5px solid var(--bord);
  border-radius:var(--r);color:var(--txt);padding:11px 14px;font-size:.95rem;
  outline:none;font-family:'Nunito',sans-serif;transition:border-color .15s;}
#join-box input:focus{border-color:var(--acc);}
#join-btn{background:linear-gradient(135deg,var(--acc),#9d96ff);color:#fff;
  border:none;padding:13px;border-radius:var(--r);font-size:.95rem;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;}

/* ─ Round result overlay ────────────────────────────────────────────── */
#result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(6px);}
#result-overlay.show{display:flex;}
#result-box{background:var(--surf);border:1px solid var(--bord);
  border-radius:18px;padding:26px 22px;text-align:center;width:min(290px,86vw);}
#result-box .re{font-size:2.8rem;margin-bottom:8px;}
#result-box h3{font-size:1.2rem;font-weight:800;margin-bottom:4px;}
#result-box .rw{font-size:1.6rem;font-weight:900;color:var(--acc);margin:10px 0;letter-spacing:.04em;}
#result-box p{color:var(--txt2);font-size:.85rem;}
#result-box .next-info{color:var(--txt2);font-size:.78rem;margin-top:10px;
  background:var(--surf2);padding:6px 12px;border-radius:8px;}
</style>
</head>
<body>
<div id="app">

  <!-- Join -->
  <div id="join-overlay">
    <div id="join-box">
      <h2>🎨 Draw & Guess</h2>
      <p>Join the game to start playing!</p>
      <input id="name-in" placeholder="Your name" maxlength="24" autocomplete="off"/>
      <input id="room-in" placeholder="Room ID" maxlength="60" autocomplete="off"/>
      <button id="join-btn">Join Game →</button>
    </div>
  </div>

  <!-- Round result -->
  <div id="result-overlay">
    <div id="result-box">
      <div class="re" id="re-emoji">🎉</div>
      <h3 id="re-title"></h3>
      <div class="rw" id="re-word"></div>
      <p id="re-sub"></p>
      <p class="next-info">Next round starting automatically...</p>
    </div>
  </div>

  <!-- Custom confirm modal -->
  <div id="modal-overlay">
    <div id="modal-box">
      <p id="modal-msg">Are you sure?</p>
      <div class="mbtnrow">
        <button id="modal-no">Cancel</button>
        <button id="modal-yes">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Brush panel (anchored above toolbar) -->
  <div id="brush-panel" class="panel">
    <div class="ptitle">BRUSH TYPE</div>
    <div class="bopt on" data-brush="pen">  <span class="bi">🖊</span> Pen</div>
    <div class="bopt" data-brush="pencil">  <span class="bi">✏️</span> Pencil</div>
    <div class="bopt" data-brush="marker">  <span class="bi">🖍</span> Marker</div>
    <div class="bopt" data-brush="eraser">  <span class="bi">🧽</span> Eraser</div>
  </div>

  <!-- Layer panel -->
  <div id="layer-panel" class="panel">
    <div class="ptitle">LAYERS</div>
    <div class="lrow al" data-layer="3">
      <span class="lvis sv" data-lv="3">👁</span><span class="lname">Layer 3</span>
      <div class="lthumb"><canvas id="lt3"></canvas></div>
    </div>
    <div class="lrow" data-layer="2">
      <span class="lvis sv" data-lv="2">👁</span><span class="lname">Layer 2</span>
      <div class="lthumb"><canvas id="lt2"></canvas></div>
    </div>
    <div class="lrow" data-layer="1">
      <span class="lvis sv" data-lv="1">👁</span><span class="lname">Layer 1</span>
      <div class="lthumb"><canvas id="lt1"></canvas></div>
    </div>
    <button id="merge-btn" class="pbtn sm">Merge All Layers</button>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="panel">
    <div class="ptitle">CANVAS SETTINGS</div>
    <label>Canvas Size</label>
    <select id="canvas-size-sel">
      <option value="640x360">640 × 360</option>
      <option value="800x500" selected>800 × 500</option>
      <option value="1024x640">1024 × 640</option>
      <option value="1280x720">1280 × 720 (HD)</option>
    </select>
    <button id="apply-size-btn" class="pbtn">Apply Size</button>
  </div>

  <!-- Topbar -->
  <div id="topbar">
    <div id="conn-dot"></div>
    <div id="word-display">connecting…</div>
    <div id="timer-box" style="display:none">90s</div>
    <span id="role-pill">—</span>
    <button class="tbtn" id="btn-settings" style="width:32px;height:32px;font-size:.82rem;">⚙️</button>
  </div>

  <!-- Canvas -->
  <div id="canvas-outer">
    <div id="canvas-inner">
      <canvas id="cv-bg" class="cvl"></canvas>
      <canvas id="cv-l1" class="cvl"></canvas>
      <canvas id="cv-l2" class="cvl"></canvas>
      <canvas id="cv-l3" class="cvl"></canvas>
    </div>
    <div id="guesser-overlay">
      <!-- empty — just blocks drawing cursor for guessers -->
    </div>
  </div>

  <!-- Drawer chat (sees guesses, read-only) -->
  <div id="drawer-chat"></div>

  <!-- Drawer toolbar -->
  <div id="toolbar">
    <div id="palette" style="display:flex;gap:4px;align-items:center;flex-shrink:0;"></div>
    <div class="sep"></div>
    <button class="tbtn on" id="btn-brush">🖊</button>
    <button class="tbtn" id="btn-layers">📋</button>
    <div class="sep"></div>
    <div id="sz-wrap">
      <div id="sz-dot"></div>
      <input type="range" id="sz-range" min="1" max="80" value="8"/>
    </div>
    <div class="sep"></div>
    <button class="tbtn" id="btn-undo">↩️</button>
    <button class="tbtn" id="btn-redo">↪️</button>
    <button class="tbtn rbtn" id="btn-clear" style="font-size:.85rem;">🗑</button>
    <div class="sep"></div>
    <div id="zoom-wrap">
      <button class="tbtn" id="btn-zo" style="font-size:1.1rem;font-weight:900;">−</button>
      <span id="zoom-lbl">100%</span>
      <button class="tbtn" id="btn-zi" style="font-size:1.1rem;font-weight:900;">+</button>
      <button class="tbtn" id="btn-zf" style="font-size:.62rem;font-weight:900;">FIT</button>
    </div>
    <div class="sep"></div>
    <button class="tbtn gbtn" id="btn-done">✅</button>
  </div>

  <!-- Guesser area -->
  <div id="guess-area">
    <div id="chat-log"></div>
    <div id="guess-row">
      <input id="guess-in" placeholder="Type your guess…" autocomplete="off" autocorrect="off" autocapitalize="off"/>
      <button id="hint-btn">💡 Hint</button>
      <button id="guess-go">Send</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
(function(){
'use strict';

// ── Telegram ──────────────────────────────────────────────────────────────────
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

// ── Canvas setup ──────────────────────────────────────────────────────────────
let CW=800,CH=500;
const LAYERS={bg:document.getElementById('cv-bg'),
  1:document.getElementById('cv-l1'),2:document.getElementById('cv-l2'),3:document.getElementById('cv-l3')};
const CTX={};
const layerVis={1:true,2:true,3:true};
let activeLayer=3;
let isDrawer=false;  // declared early — fixes bug #2
let ws=null,myName='',myRoom='';
let hintCooldown=false;

function initCanvases(){
  Object.entries(LAYERS).forEach(([k,cv])=>{
    cv.width=CW;cv.height=CH;cv.style.width=CW+'px';cv.style.height=CH+'px';
    CTX[k]=cv.getContext('2d');
  });
  CTX.bg.fillStyle='#fff';CTX.bg.fillRect(0,0,CW,CH);
  fitCanvas();
}
const actCtx=()=>CTX[activeLayer];

// ── Zoom / pan ─────────────────────────────────────────────────────────────────
let zoom=1,panX=0,panY=0,pinching=false,lastPinchD=0,lastPinchM=null;
const inner=document.getElementById('canvas-inner');
const outer=document.getElementById('canvas-outer');

function applyT(){
  inner.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';
}
function fitCanvas(){
  const ow=outer.clientWidth,oh=outer.clientHeight;
  zoom=Math.min(ow/CW,oh/CH,1);
  panX=(ow-CW*zoom)/2;panY=(oh-CH*zoom)/2;
  applyT();
}
window.addEventListener('resize',fitCanvas);

function zoomAt(d,cx,cy){
  const r=outer.getBoundingClientRect();
  const ox=cx-r.left,oy=cy-r.top;
  const nz=Math.max(.15,Math.min(8,zoom*d));
  panX=ox-(ox-panX)*(nz/zoom);panY=oy-(oy-panY)*(nz/zoom);
  zoom=nz;applyT();
}

outer.addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){e.preventDefault();zoomAt(e.deltaY<0?1.12:.89,e.clientX,e.clientY);}
},{passive:false});

outer.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinching=true;
    lastPinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY);
    lastPinchM={x:(e.touches[0].clientX+e.touches[1].clientX)/2,
      y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    e.preventDefault();
  }
},{passive:false});

outer.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinching){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY);
    const m={x:(e.touches[0].clientX+e.touches[1].clientX)/2,
      y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    if(lastPinchD>0)zoomAt(d/lastPinchD,m.x,m.y);
    panX+=m.x-lastPinchM.x;panY+=m.y-lastPinchM.y;
    lastPinchD=d;lastPinchM=m;applyT();
  }
},{passive:false});
outer.addEventListener('touchend',e=>{if(e.touches.length<2)pinching=false;});

document.getElementById('btn-zi').addEventListener('click',()=>{const r=outer.getBoundingClientRect();zoomAt(1.25,r.left+r.width/2,r.top+r.height/2);});
document.getElementById('btn-zo').addEventListener('click',()=>{const r=outer.getBoundingClientRect();zoomAt(.8,r.left+r.width/2,r.top+r.height/2);});
document.getElementById('btn-zf').addEventListener('click',fitCanvas);

function getXY(e){
  const r=outer.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return[(s.clientX-r.left-panX)/zoom,(s.clientY-r.top-panY)/zoom];
}

// ── Drawing ────────────────────────────────────────────────────────────────────
let drawing=false,lx=0,ly=0,brushType='pen',color='#222222',brushSize=8;
let undoStack=[],redoStack=[];
let curStroke=null;

const BRUSHES={
  pen:   {op:'source-over',alpha:1,  lw:1,  blur:0},
  pencil:{op:'source-over',alpha:.6, lw:.8, blur:.4},
  marker:{op:'source-over',alpha:.4, lw:2.5,blur:0},
  eraser:{op:'destination-out',alpha:1,lw:1,blur:0},
};

function applyBS(ctx,c,s,bt){
  const b=BRUSHES[bt||brushType]||BRUSHES.pen;
  ctx.globalCompositeOperation=b.op;
  ctx.globalAlpha=b.alpha;
  // Fix bug #3: eraser uses white fill visually but destination-out compositionally
  ctx.strokeStyle=b.op==='destination-out'?'rgba(255,255,255,1)':c;
  ctx.fillStyle=ctx.strokeStyle;
  ctx.lineWidth=s*b.lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.filter=b.blur?`blur(${b.blur}px)`:'none';
}
function resetBS(ctx){ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.filter='none';}

function renderStroke(stroke,tCtx){
  const ctx=tCtx||CTX[stroke.layer||3]||actCtx();
  const pts=stroke.points||[];if(!pts.length)return;
  const bt=stroke.brush||'pen';
  // Fix bug #3: eraser color can be null — handle it
  const strokeColor=stroke.color||'#222222';
  applyBS(ctx,strokeColor,stroke.size||8,bt);
  ctx.beginPath();
  if(pts.length===1){
    ctx.arc(pts[0][0],pts[0][1],(stroke.size||8)/2,0,Math.PI*2);ctx.fill();
  } else {
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke();
  }
  resetBS(ctx);
}

// Undo/redo — snapshots all layers
function saveUndo(){
  const s={};[1,2,3].forEach(n=>s[n]=CTX[n].getImageData(0,0,CW,CH));
  undoStack.push(s);if(undoStack.length>40)undoStack.shift();redoStack=[];
}
function doUndo(){
  if(!undoStack.length)return;
  const c={};[1,2,3].forEach(n=>c[n]=CTX[n].getImageData(0,0,CW,CH));
  redoStack.push(c);const s=undoStack.pop();
  [1,2,3].forEach(n=>CTX[n].putImageData(s[n],0,0));
  // Fix bug #4: debounce snapshot — send only after user stops tapping
  scheduleSendSnap();updateThumbs();
}
function doRedo(){
  if(!redoStack.length)return;
  const c={};[1,2,3].forEach(n=>c[n]=CTX[n].getImageData(0,0,CW,CH));
  undoStack.push(c);const s=redoStack.pop();
  [1,2,3].forEach(n=>CTX[n].putImageData(s[n],0,0));
  scheduleSendSnap();updateThumbs();
}
let snapTimer=null;
function scheduleSendSnap(){
  clearTimeout(snapTimer);
  snapTimer=setTimeout(()=>{ ws?.send(JSON.stringify({type:'snapshot',data:getMerged()})); },600);
}

function getMerged(){
  const t=document.createElement('canvas');t.width=CW;t.height=CH;
  const tc=t.getContext('2d');tc.fillStyle='#fff';tc.fillRect(0,0,CW,CH);
  [1,2,3].forEach(n=>{if(layerVis[n])tc.drawImage(LAYERS[n],0,0);});
  return t.toDataURL('image/png');
}

function updateThumbs(){
  [1,2,3].forEach(n=>{
    const th=document.getElementById(`lt${n}`);if(!th)return;
    th.width=28;th.height=18;
    const tc=th.getContext('2d');tc.fillStyle='#fff';tc.fillRect(0,0,28,18);
    tc.drawImage(LAYERS[n],0,0,28,18);
  });
}

// ── Color palette ──────────────────────────────────────────────────────────────
const COLORS=['#222222','#ffffff','#ff3855','#ff8c42','#ffd60a',
  '#06d6a0','#0077b6','#7b2d8b','#ff6b8a','#8b4513',

// ── Custom modal (replaces confirm) ───────────────────────────────────────────
const modalOverlay=document.getElementById('modal-overlay');
let modalResolve=null;
function showModal(msg){
  document.getElementById('modal-msg').textContent=msg;
  modalOverlay.classList.add('open');
  return new Promise(res=>{modalResolve=res;});
}
document.getElementById('modal-yes').addEventListener('click',()=>{modalOverlay.classList.remove('open');modalResolve&&modalResolve(true);});
document.getElementById('modal-no').addEventListener('click',()=>{modalOverlay.classList.remove('open');modalResolve&&modalResolve(false);});

// ── Drawing events ─────────────────────────────────────────────────────────────
function onStart(e){
  // Fix bug #10: check ws connected AND is drawer
  if(!isDrawer||pinching||!ws||ws.readyState!==1)return;
  if(e.touches?.length>1)return;
  e.preventDefault();
  drawing=true;saveUndo();[lx,ly]=getXY(e);
  curStroke={brush:brushType,
    // Fix bug #3: eraser sends '#ffffff' not null
    color:brushType==='eraser'?'#ffffff':color,
    size:brushSize,layer:activeLayer,points:[[lx,ly]]};
}
function onMove(e){
  if(!drawing||!isDrawer||pinching)return;
  if(e.touches?.length>1)return;
  e.preventDefault();
  const[x,y]=getXY(e);
  // draw the actual stroke color for eraser is white
  const drawColor=brushType==='eraser'?'#ffffff':color;
  applyBS(actCtx(),drawColor,brushSize);
  actCtx().beginPath();actCtx().moveTo(lx,ly);actCtx().lineTo(x,y);actCtx().stroke();
  resetBS(actCtx());
  curStroke.points.push([x,y]);lx=x;ly=y;
}
function onEnd(){
  if(!drawing)return;drawing=false;
  if(curStroke&&ws?.readyState===1)ws.send(JSON.stringify({type:'draw',stroke:curStroke}));
  curStroke=null;updateThumbs();
}
outer.addEventListener('pointerdown',onStart,{passive:false});
outer.addEventListener('pointermove',onMove,{passive:false});
outer.addEventListener('pointerup',onEnd);
outer.addEventListener('pointercancel',onEnd);

// Toolbar buttons
document.getElementById('btn-undo').addEventListener('click',()=>{if(isDrawer)doUndo();});
document.getElementById('btn-redo').addEventListener('click',()=>{if(isDrawer)doRedo();});
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!isDrawer)return;
  showModal('Clear the entire canvas?').then(ok=>{
    if(!ok)return;
    saveUndo();[1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
    redoStack=[];ws?.send(JSON.stringify({type:'clear'}));updateThumbs();
  });
});
document.getElementById('btn-done').addEventListener('click',()=>{
  if(!isDrawer)return;
  // Fix bug #6: use custom modal not confirm()
  showModal('Finish drawing and reveal the word?').then(ok=>{
    if(ok)ws?.send(JSON.stringify({type:'done_drawing'}));
  });
});

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastT=null;const toastEl=document.getElementById('toast');
function showToast(msg,cls=''){
  toastEl.textContent=msg;toastEl.className='show '+(cls||'');
  clearTimeout(toastT);toastT=setTimeout(()=>{toastEl.className='';},3000);
}

// ── Chat helpers ───────────────────────────────────────────────────────────────
function addToLog(el,cls,html){
  const d=document.createElement('div');d.className='cmsg '+cls;d.innerHTML=html;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

// ── Timer display ──────────────────────────────────────────────────────────────
const timerBox=document.getElementById('timer-box');
function updateTimer(t){
  timerBox.style.display='block';
  timerBox.textContent=`⏱ ${t}s`;
  timerBox.className=t>30?'':t>10?'warn':'danger';
}

// ── Role setup ─────────────────────────────────────────────────────────────────
function setRole(role,wordOrLen,hintText){
  isDrawer=role==='drawer';
  // Fix bug #14: close all panels when role switches
  closeAllPanels();

  document.getElementById('toolbar').style.display=isDrawer?'flex':'none';
  document.getElementById('guess-area').style.display=isDrawer?'none':'flex';
  document.getElementById('drawer-chat').style.display=isDrawer?'block':'none';
  // Fix bug #7: guesser mode cursor
  outer.classList.toggle('guesser-mode',!isDrawer);

  const pill=document.getElementById('role-pill');
  // Fix bug #1: set class correctly
  pill.className=isDrawer?'drawer':'guesser';
  pill.id='role-pill';
  pill.textContent=isDrawer?'DRAWING':'GUESSING';

  if(isDrawer){
    document.getElementById('word-display').textContent=`Draw: ${wordOrLen}`;
    document.getElementById('word-display').style.color='var(--grn)';
    showToast(`🖌 Draw: ${wordOrLen}`);
    undoStack=[];redoStack=[];
  } else {
    const display=hintText||Array(+wordOrLen).fill('_').join(' ');
    document.getElementById('word-display').textContent=display;
    document.getElementById('word-display').style.color='var(--acc)';
    showToast(`🤔 Guess the word! ${wordOrLen} letters`);
    // reset hint cooldown
    hintCooldown=false;
    document.getElementById('hint-btn').disabled=false;
    document.getElementById('hint-btn').textContent='💡 Hint';
  }
}

// ── Hint button ────────────────────────────────────────────────────────────────
document.getElementById('hint-btn').addEventListener('click',()=>{
  if(hintCooldown||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:'request_hint'}));
  hintCooldown=true;
  document.getElementById('hint-btn').disabled=true;
  document.getElementById('hint-btn').textContent='💡 30s';
  let cd=30;
  const iv=setInterval(()=>{
    cd--;
    if(cd<=0){
      clearInterval(iv);
      hintCooldown=false;
      document.getElementById('hint-btn').disabled=false;
      document.getElementById('hint-btn').textContent='💡 Hint';
    } else {
      document.getElementById('hint-btn').textContent=`💡 ${cd}s`;
    }
  },1000);
});

// ── Round result ───────────────────────────────────────────────────────────────
const resultOverlay=document.getElementById('result-overlay');
function showResult(emoji,title,word,sub){
  document.getElementById('re-emoji').textContent=emoji;
  document.getElementById('re-title').textContent=title;
  document.getElementById('re-word').textContent=word;
  document.getElementById('re-sub').textContent=sub;
  resultOverlay.classList.add('show');
  setTimeout(()=>resultOverlay.classList.remove('show'),5000);
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws?room=${encodeURIComponent(myRoom)}&name=${encodeURIComponent(myName)}`);

  ws.onopen=()=>{
    const d=document.getElementById('conn-dot');
    d.classList.add('on');
    document.getElementById('word-display').textContent='waiting for players…';
  };

  ws.onmessage=({data})=>{
    let m;try{m=JSON.parse(data);}catch{return;}
    const chatLog=document.getElementById('chat-log');
    const drawerChat=document.getElementById('drawer-chat');

    switch(m.type){
      case 'init':
        [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
        (m.strokes||[]).forEach(s=>renderStroke(s,CTX[s.layer||3]));
        document.getElementById('word-display').textContent=`${m.players} players connected`;
        if(m.timeLeft)updateTimer(m.timeLeft);
        if(m.hint){
          document.getElementById('word-display').textContent=m.hint;
          document.getElementById('word-display').style.color='var(--acc)';
        }
        break;

      case 'draw':
        renderStroke(m.stroke,CTX[m.stroke.layer||3]);updateThumbs();break;

      case 'clear':
        [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
        undoStack=[];redoStack=[];updateThumbs();break;

      case 'snapshot':
        const img=new Image();
        img.onload=()=>{
          [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
          CTX[1].drawImage(img,0,0,CW,CH);updateThumbs();
        };
        img.src=m.data;break;

      case 'role':
        setRole(m.role,m.role==='drawer'?m.word:m.hint,m.hintText);
        [1,2,3].forEach(n=>CTX[n].clearRect(0,0,CW,CH));
        undoStack=[];redoStack=[];updateThumbs();break;

      case 'hint':
        // Update word display with revealed letters
        document.getElementById('word-display').textContent=m.hint;
        showToast(`💡 Letter revealed!`,'');
        addToLog(chatLog,'sys',`💡 Hint: ${m.hint}`);
        break;

      case 'timer':
        updateTimer(m.timeLeft);break;

      case 'guess':
        const msgHtml=`<span class="cn">${m.name}:</span> ${m.text}${m.correct?' ✅':''}`;
        addToLog(chatLog,m.correct?'ok':'',msgHtml);
        addToLog(drawerChat,m.correct?'ok':'',msgHtml);
        if(m.correct)showToast(`🎉 ${m.name} guessed it!`,'ok');
        break;

      case 'round_end':
        timerBox.style.display='none';
        showResult(
          m.guesser?'🎉':'⏰',
          m.guesser?`${m.guesser} guessed it!`:'Time\'s up!',
          m.word,
          m.guesser?`Artist: ${m.drawerName}`:`The word was: ${m.word}`
        );
        break;

      case 'status':
        document.getElementById('word-display').textContent=m.message;
        addToLog(chatLog,'sys',m.message);
        break;

      case 'player_joined':
      case 'player_left':
        addToLog(chatLog,'sys',
          m.type==='player_joined'?`👋 ${m.name} joined`:`👋 ${m.name} left`);
        break;
    }
  };

  ws.onclose=()=>{
    document.getElementById('conn-dot').classList.remove('on');
    setTimeout(connect,2500);
  };
  ws.onerror=()=>ws.close();
}

// ── Guess ──────────────────────────────────────────────────────────────────────
function sendGuess(){
  const inp=document.getElementById('guess-in');
  const t=inp.value.trim();
  if(!t||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:'guess',text:t}));
  inp.value='';
}

// ── Join ───────────────────────────────────────────────────────────────────────
const joinOverlay=document.getElementById('join-overlay');
function doJoin(){
  myName=document.getElementById('name-in').value.trim()||`Player${Math.floor(Math.random()*1000)}`;
  myRoom=document.getElementById('room-in').value.trim()||'default';
