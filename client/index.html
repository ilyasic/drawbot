<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Draw & Guess</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #1c1f26;
  --surface: #252830;
  --surface2:#2e3140;
  --border:  #383d52;
  --accent:  #6c63ff;
  --accent2: #ff5fa0;
  --green:   #3dd68c;
  --yellow:  #ffd166;
  --red:     #ff5757;
  --text:    #eeeef5;
  --text2:   #7880a0;
  --r:       12px;
  --topbar-h:46px;
  --toolbar-h:100px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;touch-action:none}

/* ── App shell ── */
#app{
  display:flex;flex-direction:column;
  position:fixed;inset:0;
  top:var(--tg-safe-top,0px);
  height:var(--tg-viewport-stable-height,100dvh);
  overflow:hidden;
}

/* ── Topbar ── */
#topbar{
  height:var(--topbar-h);min-height:var(--topbar-h);
  display:flex;align-items:center;gap:8px;padding:0 12px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;
}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
#word-display{
  flex:1;text-align:center;font-family:'Syne',sans-serif;
  font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
}
#role-pill{
  font-size:.6rem;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--surface2);color:var(--text2);text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;letter-spacing:.05em;
}
#role-pill.drawer {background:rgba(108,99,255,.25);color:var(--accent)}
#role-pill.guesser{background:rgba(255,95,160,.2);color:var(--accent2)}
#timer-display{
  font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
  color:var(--yellow);min-width:34px;text-align:right;flex-shrink:0;
}
#timer-display.urgent{color:var(--red);animation:pulse .5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Canvas fills everything between topbar and toolbar ── */
#canvas-area{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg);min-height:0;
}
#canvas-wrap{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.cvl{position:absolute;top:0;left:0}
#cv-bg{background:#fff;z-index:1}
#cv-main{z-index:2;cursor:crosshair}
#cv-preview{z-index:3;pointer-events:none}

/* ── Chat (guesser) — compact strip above toolbar ── */
#chat-panel{
  flex-shrink:0;display:none;flex-direction:column;gap:4px;
  padding:6px 10px calc(6px + env(safe-area-inset-bottom,0px));
  background:var(--surface);border-top:1px solid var(--border);z-index:15;
}
#chat-panel.visible{display:flex}
#chat-log{
  max-height:46px;overflow-y:auto;display:flex;flex-direction:column;
  gap:1px;scrollbar-width:none;
}
#chat-log::-webkit-scrollbar{display:none}
.cmsg{font-size:.75rem;color:var(--text2);line-height:1.3}
.cmsg .cn{color:var(--text);font-weight:600}
.cmsg.ok{color:var(--green);font-weight:700}
.cmsg.sys{color:var(--accent);font-style:italic}
#guess-row{display:flex;gap:6px}
#guess-in{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text);padding:7px 12px;
  font-size:.88rem;outline:none;font-family:'DM Sans',sans-serif;min-width:0;
}
#guess-in:focus{border-color:var(--accent)}
#guess-go{
  background:var(--accent);color:#fff;border:none;padding:7px 16px;
  border-radius:var(--r);font-size:.85rem;font-weight:700;cursor:pointer;
  font-family:'Syne',sans-serif;flex-shrink:0;
}

/* ── Toolbar — icon grid, minimal, like reference ── */
#toolbar{
  flex-shrink:0;display:none;
  flex-direction:column;gap:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:20;
}
#toolbar.visible{display:flex}

/* Two equal rows */
.tb-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:8px 12px;
  min-height:50px;
}
.tb-row:first-child{border-bottom:1px solid var(--border)}

/* Icon buttons — rounded squares like reference */
.tbtn{
  width:42px;height:42px;min-width:42px;
  border-radius:12px;border:none;
  background:var(--surface2);color:var(--text);
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
  -webkit-user-select:none;position:relative;
}
.tbtn:active{transform:scale(.86);background:var(--border)}
.tbtn.on   {background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(108,99,255,.4)}
.tbtn.green{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(61,214,140,.35)}
.tbtn.red  {background:var(--red);color:#fff;box-shadow:0 4px 12px rgba(255,87,87,.35)}
.tbtn.active-color{
  /* shows current color as background */
  border:3px solid rgba(255,255,255,.35);
}

/* Color dot indicator on brush button */
.color-dot{
  position:absolute;bottom:4px;right:4px;
  width:10px;height:10px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.6);
  pointer-events:none;
}

/* Size label next to slider */
.sz-lbl{font-size:.68rem;color:var(--text2);font-weight:700;min-width:20px;text-align:center}

/* Inline size in toolbar */
#tb-size-wrap{
  display:flex;align-items:center;gap:5px;
  background:var(--surface2);border-radius:10px;
  padding:0 10px;height:42px;flex:1;max-width:140px;
}
#sz-range{
  -webkit-appearance:none;flex:1;height:3px;
  border-radius:2px;background:var(--border);outline:none;
}
#sz-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);border:2px solid #fff;cursor:pointer;
}

/* ── Popup panels — appear above toolbar ── */
.popup{
  position:fixed;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  z-index:300;
  display:none;
  flex-direction:column;gap:6px;
  box-shadow:0 16px 48px rgba(0,0,0,.75);
  animation:popIn .15s cubic-bezier(.17,.67,.41,1.3);
}
.popup.open{display:flex}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Popup anchor positions — always above toolbar */
#brush-popup {bottom:calc(var(--toolbar-h) + 10px);left:12px;min-width:150px}
#color-popup {bottom:calc(var(--toolbar-h) + 10px);left:50%;transform:translateX(-50%);min-width:210px}
#opacity-popup{bottom:calc(var(--toolbar-h) + 10px);left:50%;transform:translateX(-50%);min-width:180px}
#layer-popup {bottom:calc(var(--toolbar-h) + 10px);right:12px;min-width:170px}
#players-popup{top:calc(var(--topbar-h) + 10px);right:12px;min-width:160px;max-height:260px;overflow-y:auto}
#lb-popup    {top:calc(var(--topbar-h) + 10px);left:50%;transform:translateX(-50%);min-width:200px}

/* Popup section label */
.pop-label{font-size:.62rem;color:var(--text2);font-weight:700;letter-spacing:.08em;text-transform:uppercase}

/* Brush list */
.brush-opt{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;
  border:1.5px solid transparent;transition:all .1s;white-space:nowrap;
}
.brush-opt:hover{background:var(--surface2)}
.brush-opt.on{border-color:var(--accent);background:rgba(108,99,255,.15);color:var(--accent)}
.brush-icon{font-size:1rem;width:22px;text-align:center}

/* Color grid */
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.cswatch{
  width:30px;height:30px;min-width:30px;
  border-radius:50%;border:2px solid transparent;
  cursor:pointer;flex-shrink:0;transition:transform .1s;
}
.cswatch:active{transform:scale(.82)}
.cswatch.on{border-color:#fff;transform:scale(1.18);box-shadow:0 0 0 2px var(--accent)}
#custom-color-wrap{display:flex;align-items:center;gap:8px;padding-top:2px}
#custom-color{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0}
#custom-color-lbl{font-size:.75rem;color:var(--text2)}

/* Opacity slider in popup */
#op-popup-wrap{display:flex;align-items:center;gap:8px;padding:4px 2px}
#op-range{
  -webkit-appearance:none;flex:1;height:3px;
  border-radius:2px;background:var(--border);outline:none;
}
#op-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent2);border:2px solid #fff;cursor:pointer;
}
#op-lbl{font-size:.75rem;color:var(--text2);font-weight:700;min-width:34px;text-align:right}

/* Layer rows */
.layer-row{
  display:flex;align-items:center;gap:6px;padding:7px 8px;
  border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;
  border:1.5px solid transparent;
}
.layer-row:hover{background:var(--surface2)}
.layer-row.active{border-color:var(--accent);background:rgba(108,99,255,.1)}
.layer-vis{font-size:.85rem;opacity:.3;transition:opacity .15s}
.layer-vis.on{opacity:1}
.layer-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-op-slider{
  -webkit-appearance:none;width:46px;height:3px;
  background:var(--border);border-radius:2px;outline:none;flex-shrink:0;
}
.layer-op-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--text2);cursor:pointer;
}
#layer-add{font-size:.75rem;padding:7px 10px;width:100%;border-radius:8px}

/* Players / LB rows */
.player-row{display:flex;align-items:center;gap:7px;padding:5px 6px;font-size:.8rem}
.player-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.player-name{flex:1;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-score{color:var(--yellow);font-weight:700;font-size:.75rem}
.lb-title{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--yellow);margin-bottom:4px}
.lb-row{display:flex;align-items:center;gap:8px;padding:5px 6px;font-size:.82rem;border-radius:6px}
.lb-row:nth-child(2){background:rgba(255,209,102,.08)}
.lb-rank{font-weight:700;color:var(--text2);min-width:18px}
.lb-name{flex:1;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-pts{color:var(--yellow);font-weight:700;white-space:nowrap}

/* ── Toast ── */
#toast{
  position:fixed;top:calc(var(--topbar-h) + 10px);left:50%;
  transform:translateX(-50%) translateY(-6px);
  background:var(--surface2);color:var(--text);
  padding:8px 18px;border-radius:30px;font-size:.8rem;font-weight:600;
  border:1px solid var(--border);opacity:0;transition:all .2s;
  z-index:400;pointer-events:none;white-space:nowrap;
  max-width:86vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok  {background:rgba(61,214,140,.2);border-color:var(--green);color:var(--green)}
#toast.warn{background:rgba(255,81,81,.2);border-color:var(--red);color:var(--red)}

/* ── Round result ── */
#round-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;
  z-index:500;backdrop-filter:blur(10px);
}
#round-overlay.show{display:flex}
#round-box{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:28px 22px;text-align:center;width:min(300px,90vw);
  animation:popIn .3s cubic-bezier(.17,.67,.41,1.4);
}
.re-emoji{font-size:2.8rem;margin-bottom:8px}
.re-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;margin-bottom:4px}
.re-word{font-size:1.4rem;font-weight:800;color:var(--accent);margin:8px 0}
.re-sub{color:var(--text2);font-size:.84rem;margin-bottom:14px}
#re-newround{
  background:var(--accent);color:#fff;border:none;padding:11px;
  border-radius:var(--r);font-size:.9rem;font-weight:700;cursor:pointer;
  font-family:'Syne',sans-serif;width:100%;
}

/* ── Join overlay ── */
#join-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.96);
  display:flex;align-items:center;justify-content:center;
  z-index:600;backdrop-filter:blur(14px);
}
#join-box{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:28px 22px;width:min(320px,92vw);
  display:flex;flex-direction:column;gap:12px;
}
#join-box h2{
  text-align:center;font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#join-box input{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text);padding:11px 14px;
  font-size:.9rem;outline:none;font-family:'DM Sans',sans-serif;
}
#join-box input:focus{border-color:var(--accent)}
#join-btn{
  background:linear-gradient(135deg,var(--accent),#9d96ff);color:#fff;
  border:none;padding:13px;border-radius:var(--r);font-size:.95rem;
  font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;
}

/* ── Replay ── */
#replay-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.9);
  display:none;align-items:center;justify-content:center;
  z-index:450;backdrop-filter:blur(6px);flex-direction:column;gap:14px;
}
#replay-overlay.show{display:flex}
#replay-canvas{border-radius:12px;max-width:90vw;max-height:56vh;background:#fff}
#replay-close{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 18px;border-radius:20px;cursor:pointer;font-size:.84rem;
}

/* ── Desktop: bigger toolbar buttons ── */
@media(min-width:640px){
  :root{--topbar-h:52px;--toolbar-h:64px}
  #toolbar{flex-direction:row;align-items:center;padding:0 16px;justify-content:center;gap:10px}
  .tb-row{display:contents}
  .tb-row:first-child{border-bottom:none}
  .tbtn{width:44px;height:44px;min-width:44px}
  #tb-size-wrap{max-width:120px}
}
</style>
</head>
<body>
<div id="app">

  <!-- Join overlay -->
  <div id="join-overlay">
    <div id="join-box">
      <h2>🎨 Draw & Guess</h2>
      <input id="name-in" placeholder="Your name" maxlength="24" autocomplete="off"/>
      <input id="room-in" placeholder="Room ID" maxlength="60" autocomplete="off"/>
      <button id="join-btn">Join Game →</button>
    </div>
  </div>

  <!-- Round result overlay -->
  <div id="round-overlay">
    <div id="round-box">
      <div class="re-emoji" id="re-emoji">🎉</div>
      <div class="re-title" id="re-title"></div>
      <div class="re-word"  id="re-word"></div>
      <div class="re-sub"   id="re-sub"></div>
      <button id="re-newround">▶ New Round</button>
    </div>
  </div>

  <!-- Replay overlay -->
  <div id="replay-overlay">
    <canvas id="replay-canvas"></canvas>
    <button id="replay-close">✕ Close</button>
  </div>

  <!-- ── Popups (shown on demand) ── -->

  <!-- Brush popup -->
  <div class="popup" id="brush-popup">
    <div class="brush-opt on"  data-brush="pen">    <span class="brush-icon">🖊</span>Pen</div>
    <div class="brush-opt"     data-brush="pencil"> <span class="brush-icon">✏️</span>Pencil</div>
    <div class="brush-opt"     data-brush="marker"> <span class="brush-icon">🖍</span>Marker</div>
    <div class="brush-opt"     data-brush="bristle"><span class="brush-icon">🎨</span>Bristle</div>
    <div class="brush-opt"     data-brush="flat">   <span class="brush-icon">▬</span>Flat</div>
    <div class="brush-opt"     data-brush="eraser"> <span class="brush-icon">🧽</span>Eraser</div>
  </div>

  <!-- Color popup -->
  <div class="popup" id="color-popup">
    <div class="pop-label">Basic</div>
    <div class="color-row" id="colors-basic"></div>
    <div class="pop-label">Pastel</div>
    <div class="color-row" id="colors-pastel"></div>
    <div class="pop-label">Neon</div>
    <div class="color-row" id="colors-neon"></div>
    <div id="custom-color-wrap">
      <input type="color" id="custom-color" value="#6c63ff"/>
      <span id="custom-color-lbl">Custom color</span>
    </div>
  </div>

  <!-- Opacity popup -->
  <div class="popup" id="opacity-popup">
    <div class="pop-label">Opacity</div>
    <div id="op-popup-wrap">
      <input type="range" id="op-range" min="5" max="100" value="100"/>
      <span id="op-lbl">100%</span>
    </div>
  </div>

  <!-- Layer popup -->
  <div class="popup" id="layer-popup">
    <div id="layer-list"></div>
    <button class="tbtn" id="layer-add">+ Layer</button>
  </div>

  <!-- Players popup -->
  <div class="popup" id="players-popup">
    <div class="pop-label">Players</div>
    <div id="player-list"></div>
  </div>

  <!-- Leaderboard popup -->
  <div class="popup" id="lb-popup">
    <div class="lb-title">🏆 Leaderboard</div>
    <div id="lb-list"></div>
  </div>

  <!-- Topbar -->
  <div id="topbar">
    <div id="conn-dot"></div>
    <div id="word-display">connecting…</div>
    <span id="role-pill">—</span>
    <span id="timer-display"></span>
    <button class="tbtn" id="btn-players"     style="width:32px;height:32px;font-size:.85rem;border-radius:8px">👥</button>
    <button class="tbtn" id="btn-leaderboard" style="width:32px;height:32px;font-size:.8rem;border-radius:8px">🏆</button>
  </div>

  <!-- Canvas (takes all available space) -->
  <div id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="cv-bg"      class="cvl"></canvas>
      <canvas id="cv-main"    class="cvl"></canvas>
      <canvas id="cv-preview" class="cvl"></canvas>
    </div>

    <!-- Chat floats over canvas for guessers -->
    <div id="chat-panel" class="visible">
      <div id="chat-log"></div>
      <div id="guess-row">
        <input id="guess-in" placeholder="Type your guess…" autocomplete="off" autocorrect="off" autocapitalize="off"/>
        <button id="guess-go">Send</button>
      </div>
    </div>
  </div>

  <!-- Toolbar (drawer only) — minimal icon grid -->
  <div id="toolbar">
    <!-- Row 1: brush, color, opacity, layers, undo, redo, clear -->
    <div class="tb-row">
      <button class="tbtn on" id="btn-brush" title="Brush">🖊<div class="color-dot" id="color-dot"></div></button>
      <button class="tbtn"    id="btn-color" title="Color">🎨</button>
      <button class="tbtn"    id="btn-opacity" title="Opacity">💧</button>
      <button class="tbtn"    id="btn-layers" title="Layers">📋</button>
      <button class="tbtn"    id="btn-undo"   title="Undo">↩</button>
      <button class="tbtn"    id="btn-redo"   title="Redo">↪</button>
      <button class="tbtn red" id="btn-clear" title="Clear">✕</button>
    </div>
    <!-- Row 2: size slider, skip, done, theme, sound -->
    <div class="tb-row">
      <div id="tb-size-wrap">
        <div id="sz-preview"></div>
        <input type="range" id="sz-range" min="1" max="60" value="8"/>
        <span class="sz-lbl" id="sz-lbl">8</span>
      </div>
      <button class="tbtn"       id="btn-skip"    title="Skip word">⏭</button>
      <button class="tbtn green" id="btn-done"    title="Done drawing">✓</button>
      <button class="tbtn"       id="btn-theme"   title="Theme">☀️</button>
      <button class="tbtn"       id="btn-sound"   title="Sound">🔊</button>
      <button class="tbtn"       id="btn-gallery" title="Gallery">🖼</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
(function(){
'use strict';

const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen();
  tg.onEvent('viewportChanged', () => {
    tg.expand();
    fitCanvas();
  });
}

// ── Canvas setup ──────────────────────────────────────────────────────────────
let CW = 800, CH = 500;
const bgCanvas      = document.getElementById('cv-bg');
const mainCanvas    = document.getElementById('cv-main');
const previewCanvas = document.getElementById('cv-preview');
let   bgCtx, mainCtx, previewCtx;

// Layer system
const MAX_LAYERS = 5;
let layers = []; // [{id, name, canvas, ctx, visible, opacity}]
let activeLayerIdx = 0;

function createLayer(name) {
  const canvas = document.createElement('canvas');
  canvas.width  = CW; canvas.height = CH;
  canvas.style.cssText = `position:absolute;top:0;left:0;z-index:${2+layers.length}`;
  document.getElementById('canvas-wrap').insertBefore(canvas, previewCanvas);
  const ctx = canvas.getContext('2d');
  ctx.lineCap = ctx.lineJoin = 'round';
  return { id: Date.now(), name, canvas, ctx, visible:true, opacity:1.0 };
}

function initCanvases() {
  // Set dimensions
  [bgCanvas, mainCanvas, previewCanvas].forEach(c => {
    c.width = CW; c.height = CH;
    c.style.width = CW+'px'; c.style.height = CH+'px';
  });
  bgCtx      = bgCanvas.getContext('2d');
  mainCtx    = mainCanvas.getContext('2d');
  previewCtx = previewCanvas.getContext('2d');
  bgCtx.fillStyle = '#fff'; bgCtx.fillRect(0,0,CW,CH);
  mainCtx.lineCap = mainCtx.lineJoin = 'round';

  // Create initial layer
  layers = [];
  document.querySelectorAll('#canvas-wrap canvas:not(#cv-bg):not(#cv-main):not(#cv-preview)').forEach(c=>c.remove());
  const l = createLayer('Layer 1');
  layers.push(l);
  activeLayerIdx = 0;
  renderLayerPanel();
  fitCanvas();
}

function activeLayer() { return layers[activeLayerIdx]; }
function activeCtx()   { return activeLayer()?.ctx || mainCtx; }

// ── Zoom / pan ────────────────────────────────────────────────────────────────
let zoom=1, panX=0, panY=0;
const canvasWrap = document.getElementById('canvas-wrap');
const canvasArea = document.getElementById('canvas-area');

function applyTransform() {
  canvasWrap.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
}

function fitCanvas() {
  const aw = canvasArea.clientWidth, ah = canvasArea.clientHeight;
  zoom = Math.min(aw/CW, ah/CH, 1);
  panX = (aw - CW*zoom)/2;
  panY = (ah - CH*zoom)/2;
  applyTransform();
}
window.addEventListener('resize', fitCanvas);

function clientToCanvas(cx, cy) {
  const rect = canvasArea.getBoundingClientRect();
  return [(cx - rect.left - panX) / zoom, (cy - rect.top - panY) / zoom];
}

// ── Drawing tools ─────────────────────────────────────────────────────────────
let brushType   = 'pen';
let brushSize   = 8;
let brushOpacity = 1.0;
let currentColor = '#1a1a2e';
let isDrawing   = false;
let currentStroke = null;
let lastX = 0, lastY = 0;
let lastMidX = 0, lastMidY = 0;

// Undo/redo stacks per layer
const undoStacks = new WeakMap();
const redoStacks = new WeakMap();

function getStack(layer, map) {
  if (!map.has(layer)) map.set(layer, []);
  return map.get(layer);
}

function saveUndo() {
  const l = activeLayer();
  if (!l) return;
  const stack = getStack(l, undoStacks);
  stack.push(l.ctx.getImageData(0,0,CW,CH));
  if (stack.length > 20) stack.shift();
  getStack(l, redoStacks).length = 0;
}

function doUndo() {
  const l = activeLayer();
  if (!l) return;
  const us = getStack(l, undoStacks);
  const rs = getStack(l, redoStacks);
  if (!us.length) return;
  rs.push(l.ctx.getImageData(0,0,CW,CH));
  const prev = us.pop();
  l.ctx.putImageData(prev, 0, 0);
}

function doRedo() {
  const l = activeLayer();
  if (!l) return;
  const us = getStack(l, undoStacks);
  const rs = getStack(l, redoStacks);
  if (!rs.length) return;
  us.push(l.ctx.getImageData(0,0,CW,CH));
  l.ctx.putImageData(rs.pop(), 0, 0);
}

function applyBrushSettings(ctx) {
  ctx.globalAlpha      = brushOpacity;
  ctx.globalCompositeOperation = brushType === 'eraser' ? 'destination-out' : 'source-over';
  ctx.lineWidth        = brushSize;
  ctx.lineCap          = 'round';
  ctx.lineJoin         = 'round';
  ctx.strokeStyle      = brushType === 'eraser' ? 'rgba(0,0,0,1)' : currentColor;
}

function getBristleOffset() {
  return (Math.random()-.5) * brushSize * .6;
}

function drawSegment(ctx, x0, y0, x1, y1) {
  applyBrushSettings(ctx);
  switch(brushType) {
    case 'pencil': {
      // Textured pencil: slightly rough strokes + optional dash pattern
      ctx.setLineDash([brushSize*0.6, brushSize*0.3]);
      ctx.globalAlpha = brushOpacity * 0.75;
      ctx.lineWidth   = brushSize * 0.8;
      for (let i=0; i<2; i++) {
        ctx.beginPath();
        ctx.moveTo(x0+(Math.random()-.5)*1.2, y0+(Math.random()-.5)*1.2);
        ctx.lineTo(x1+(Math.random()-.5)*1.2, y1+(Math.random()-.5)*1.2);
        ctx.stroke();
      }
      ctx.setLineDash([]); // reset
      break;
    }
    case 'marker': {
      ctx.globalAlpha = brushOpacity * 0.6;
      ctx.lineWidth   = brushSize * 1.4;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      break;
    }
    case 'bristle': {
      const bristles = Math.max(3, Math.floor(brushSize/2));
      ctx.globalAlpha = brushOpacity / bristles * 2;
      ctx.lineWidth = Math.max(1, brushSize/bristles);
      for (let i=0; i<bristles; i++) {
        ctx.beginPath();
        ctx.moveTo(x0+getBristleOffset(), y0+getBristleOffset());
        ctx.lineTo(x1+getBristleOffset(), y1+getBristleOffset());
        ctx.stroke();
      }
      break;
    }
    case 'flat': {
      ctx.lineWidth = brushSize * 2.5;
      ctx.lineCap   = 'square';
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      break;
    }
    default: { // pen / eraser
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    }
  }
  // Reset
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.lineCap = 'round';
}

// ── Pointer events ────────────────────────────────────────────────────────────
let pointerId = null;

function onPointerDown(e) {
  if (!isDrawer) return;
  if (e.pointerType === 'touch' && e.touches?.length > 1) return;
  e.preventDefault();
  pointerId = e.pointerId;
  canvasArea.setPointerCapture?.(e.pointerId);
  const [x,y] = clientToCanvas(e.clientX, e.clientY);
  saveUndo();
  isDrawing = true;
  lastX = x; lastY = y; lastMidX = x; lastMidY = y;
  currentStroke = { color:currentColor, size:brushSize, opacity:brushOpacity, brushType, points:[[x,y]] };
  const ctx = activeCtx();
  applyBrushSettings(ctx);
  ctx.beginPath(); ctx.moveTo(x,y);
}

function onPointerMove(e) {
  if (!isDrawing || !isDrawer) return;
  if (e.pointerId !== pointerId) return;
  e.preventDefault();
  const [x,y] = clientToCanvas(e.clientX, e.clientY);
  currentStroke.points.push([x,y]);
  drawSegment(activeCtx(), lastX, lastY, x, y);
  lastX = x; lastY = y;

  // Send to server in batches
  if (currentStroke.points.length % 4 === 0) {
    ws?.send(JSON.stringify({ type:'draw', stroke:{ ...currentStroke } }));
  }
}

function onPointerUp(e) {
  if (!isDrawing || !isDrawer) return;
  isDrawing = false;
  pointerId = null;
  if (currentStroke && currentStroke.points.length > 0) {
    ws?.send(JSON.stringify({ type:'draw', stroke:currentStroke }));
  }
  currentStroke = null;
}

canvasArea.addEventListener('pointerdown', onPointerDown, { passive:false });
canvasArea.addEventListener('pointermove', onPointerMove, { passive:false });
canvasArea.addEventListener('pointerup',   onPointerUp);
canvasArea.addEventListener('pointercancel', onPointerUp);

// Pinch zoom
let pinchStartDist = 0, pinchStartZoom = 1;
canvasArea.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isDrawing = false;
    const t = e.touches;
    pinchStartDist = Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
    pinchStartZoom = zoom;
    e.preventDefault();
  }
}, { passive:false });
canvasArea.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const t = e.touches;
    const d = Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
    zoom = Math.max(0.2, Math.min(8, pinchStartZoom * (d/pinchStartDist)));
    applyTransform();
  }
}, { passive:false });

// Ctrl+scroll zoom
canvasArea.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const rect = canvasArea.getBoundingClientRect();
    const ox = e.clientX-rect.left, oy = e.clientY-rect.top;
    const nz = Math.max(0.15, Math.min(8, zoom*(e.deltaY<0?1.12:0.89)));
    panX = ox-(ox-panX)*(nz/zoom);
    panY = oy-(oy-panY)*(nz/zoom);
    zoom = nz; applyTransform();
  }
}, { passive:false });

// ── Render incoming strokes ────────────────────────────────────────────────────
function renderStroke(s, ctx) {
  if (!ctx) return;
  const pts = s.points || [];
  if (pts.length < 2) return;
  const savedAlpha = ctx.globalAlpha;
  const savedComp  = ctx.globalCompositeOperation;
  ctx.globalAlpha  = s.opacity || 1;
  ctx.globalCompositeOperation = (s.brushType==='eraser') ? 'destination-out' : 'source-over';
  ctx.strokeStyle  = (s.brushType==='eraser') ? 'rgba(0,0,0,1)' : (s.color||'#000');
  ctx.lineWidth    = s.size || 4;
  ctx.lineCap = ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
  ctx.globalAlpha = savedAlpha;
  ctx.globalCompositeOperation = savedComp;
}

function clearAll() {
  layers.forEach(l => l.ctx.clearRect(0,0,CW,CH));
  bgCtx.fillStyle='#fff'; bgCtx.fillRect(0,0,CW,CH);
}

// ── Layer panel ───────────────────────────────────────────────────────────────
function renderLayerPanel() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  layers.forEach((l, i) => {
    const row = document.createElement('div');
    row.className = 'layer-row' + (i===activeLayerIdx?' active':'');
    row.innerHTML = `
      <span class="layer-vis ${l.visible?'on':''}" data-li="${i}">👁</span>
      <span class="layer-name">${l.name}</span>
      <input type="range" class="layer-op-slider" min="5" max="100" value="${Math.round(l.opacity*100)}" data-li="${i}"/>
      ${layers.length>1?`<span style="cursor:pointer;font-size:.8rem;color:var(--red)" data-del="${i}">🗑</span>`:''}
    `;
    row.addEventListener('click', ev => {
      if (ev.target.dataset.del !== undefined) {
        layers.splice(+ev.target.dataset.del,1);
        if (activeLayerIdx>=layers.length) activeLayerIdx=layers.length-1;
        renderLayerPanel(); return;
      }
      if (ev.target.dataset.li !== undefined && ev.target.classList.contains('layer-vis')) {
        layers[+ev.target.dataset.li].visible = !layers[+ev.target.dataset.li].visible;
        layers[+ev.target.dataset.li].canvas.style.opacity = layers[+ev.target.dataset.li].visible?layers[+ev.target.dataset.li].opacity:0;
        renderLayerPanel(); return;
      }
      activeLayerIdx = i; renderLayerPanel();
    });
    row.querySelector('.layer-op-slider')?.addEventListener('input', ev => {
      const li = +ev.target.dataset.li;
      layers[li].opacity = +ev.target.value/100;
      if (layers[li].visible) layers[li].canvas.style.opacity = layers[li].opacity;
    });
    list.appendChild(row);
  });
}

document.getElementById('layer-add').addEventListener('click', () => {
  if (layers.length >= MAX_LAYERS) { showToast('Max layers reached','warn'); return; }
  layers.push(createLayer(`Layer ${layers.length+1}`));
  activeLayerIdx = layers.length-1;
  renderLayerPanel();
});

// ── Color setup ───────────────────────────────────────────────────────────────
const PALETTE = {
  basic:  ['#1a1a2e','#e8e8e8','#ff5757','#ff9f43','#ffd166','#06d6a0','#118ab2','#7c6ff7'],
  pastel: ['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff','#e8baff','#ffd4ba','#c9ffba'],
  neon:   ['#ff0090','#ff6600','#ffee00','#00ff41','#00cfff','#7b00ff','#ff00ff','#00ffcc'],
};

function renderPalette() {
  ['basic','pastel','neon'].forEach(group => {
    const row = document.getElementById('colors-'+group);
    if (!row) return;
    PALETTE[group].forEach(hex => {
      const d = document.createElement('div');
      d.className = 'cswatch';
      d.style.background = hex;
      if (hex === currentColor) d.classList.add('on');
      d.addEventListener('click', () => setColor(hex));
      row.appendChild(d);
    });
  });
  // Initialize color dot with default color
  const dot = document.getElementById('color-dot');
  if (dot) dot.style.background = currentColor;
}

function setColor(hex) {
  currentColor = hex;
  document.querySelectorAll('.cswatch').forEach(s => s.classList.toggle('on', s.style.background===hex||s.style.background===hexToRgb(hex)));
  document.getElementById('custom-color').value = hex;
  // Update color dot on brush button
  const dot = document.getElementById('color-dot');
  if (dot) dot.style.background = hex;
  // Update size preview dot color
  const szDot = document.querySelector('#sz-preview div');
  if (szDot) szDot.style.background = hex;
  if (brushType==='eraser') { brushType='pen'; document.getElementById('btn-brush').innerHTML='🖊<div class="color-dot" id="color-dot" style="background:'+hex+'"></div>'; }
  closeAllPanels();
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

document.getElementById('custom-color').addEventListener('input', e => setColor(e.target.value));

// ── Brush panel ───────────────────────────────────────────────────────────────
const BRUSH_ICONS = { pen:'🖊', pencil:'✏️', marker:'🖍', bristle:'🎨', flat:'▬', eraser:'🧽' };
document.querySelectorAll('.brush-opt').forEach(el => {
  el.addEventListener('click', () => {
    brushType = el.dataset.brush;
    document.querySelectorAll('.brush-opt').forEach(b=>b.classList.remove('on'));
    el.classList.add('on');
    document.getElementById('btn-brush').innerHTML = (BRUSH_ICONS[brushType]||'🖊') + '<div class="color-dot" id="color-dot" style="background:'+currentColor+'"></div>';

});

// ── Toolbar buttons ───────────────────────────────────────────────────────────
function closeAllPanels() {
  document.querySelectorAll('.popup').forEach(p => p.classList.remove('open'));

function togglePanel(id) {
  const el = document.getElementById(id);

  closeAllPanels();
  if (!wasOpen) el.classList.add('open');
}

document.getElementById('sz-range').addEventListener('input', e => {

  const dot = document.getElementById('sz-preview');

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;

// ── Chat / Guess ──────────────────────────────────────────────────────────────
const chatLog = document.getElementById('chat-log');
function addChat(cls, html) {
  const d = document.createElement('div');
  d.className = 'cmsg ' + cls; d.innerHTML = html;
  chatLog.appendChild(d);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function sendGuess() {
  const t = document.getElementById('guess-in').value.trim();
  if (!t || !ws || ws.readyState!==1) return;
  ws.send(JSON.stringify({ type:'guess', text:t }));
  document.getElementById('guess-in').value = '';
}
document.getElementById('guess-go').addEventListener('click', sendGuess);
document.getElementById('guess-in').addEventListener('keydown', e => { if(e.key==='Enter') sendGuess(); });

// ── Replay ────────────────────────────────────────────────────────────────────
function playReplay(strokes) {
  const overlay = document.getElementById('replay-overlay');
  const rc      = document.getElementById('replay-canvas');
  overlay.classList.add('show');
  rc.width = 480; rc.height = 300;
  const ctx = rc.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,480,300);
  const scale = 480/CW;
  let i=0;
  function nextStroke() {
    if (i >= strokes.length) return;
    const s = strokes[i++];
    const pts = (s.points||[]).map(p=>[p[0]*scale,p[1]*scale]);
    if (pts.length<2) { nextStroke(); return; }
    ctx.strokeStyle = s.color||'#000';
    ctx.lineWidth   = Math.max(1,(s.size||4)*scale);
    ctx.lineCap = ctx.lineJoin = 'round';
    ctx.globalAlpha = s.opacity||1;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke();
    ctx.globalAlpha=1;
    setTimeout(nextStroke, 20);
  }
  nextStroke();
}

document.getElementById('replay-close').addEventListener('click', () => {
  document.getElementById('replay-overlay').classList.remove('show');
});

// ── Player list ───────────────────────────────────────────────────────────────
let playerScores = {};
function updatePlayerList(board) {
  playerScores = {};
  (board||[]).forEach(({name,score}) => playerScores[name]=score);
  const list = document.getElementById('player-list');
  if (!board?.length) { list.innerHTML='<div style="font-size:.75rem;color:var(--text2);padding:4px 6px">No players</div>'; return; }
  list.innerHTML = board.map(({rank,name,score}) => `
    <div class="player-row">
      <div class="player-dot"></div>
      <div class="player-name">${name}</div>
      <div class="player-score">${score}</div>
      ${rank===1?'<div class="player-crown">👑</div>':''}
    </div>`).join('');
}

function updateLeaderboard(board) {
  const list = document.getElementById('lb-list');
  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = (board||[]).slice(0,8).map(({rank,name,score}) => `
    <div class="lb-row">
      <span class="lb-rank">${medals[rank-1]||rank}</span>
      <span class="lb-name">${name}</span>
      <span class="lb-pts">${score}pts</span>
    </div>`).join('');
}

// ── Timer ─────────────────────────────────────────────────────────────────────
let timerInterval = null;
let timerSeconds  = 0;

function startTimer(seconds) {
  clearInterval(timerInterval);
  timerSeconds = seconds;
  const el = document.getElementById('timer-display');
  el.classList.remove('urgent');
  function tick() {
    el.textContent = timerSeconds>0 ? timerSeconds+'s' : '';
    if (timerSeconds <= 10) el.classList.add('urgent');
    if (timerSeconds <= 0) { clearInterval(timerInterval); return; }
    timerSeconds--;
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-display').textContent = '';
  document.getElementById('timer-display').classList.remove('urgent');
}

// ── Role management ────────────────────────────────────────────────────────────
let isDrawer = false;

function setRole(role, wordOrHint, round) {
  isDrawer = role === 'drawer';
  const toolbar  = document.getElementById('toolbar');
  const chatP    = document.getElementById('chat-panel');
  const guessRow = document.getElementById('guess-row');
  const pill     = document.getElementById('role-pill');
  const wd       = document.getElementById('word-display');

  toolbar.classList.toggle('visible', isDrawer);
  chatP.classList.toggle('visible', true); // always show chat

  guessRow.style.display = isDrawer ? 'none' : 'flex';

  pill.className = 'role-pill ' + role;
  pill.textContent = isDrawer ? 'DRAWING' : 'GUESSING';

  if (isDrawer) {
    wd.textContent  = `Draw: ${wordOrHint}`;
    wd.style.color  = 'var(--green)';
    showToast(`✏️ Draw: ${wordOrHint}`, 'ok');
    sfxRoundStart();
  } else {
    const hint = typeof wordOrHint === 'number'
      ? Array(wordOrHint).fill('_').join(' ')
      : wordOrHint;
    wd.textContent = hint;
    wd.style.color = 'var(--accent)';
    showToast(`🤔 Guess — ${typeof wordOrHint==='number'?wordOrHint:'?'} letters`);
  }

  if (round) addChat('sys', `Round ${round} started!`);
  startTimer(90);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null, myName = '', myRoom = '';

function connect() {
  const proto = location.protocol==='https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?room=${encodeURIComponent(myRoom)}&name=${encodeURIComponent(myName)}`);

  ws.onopen = () => {
    document.getElementById('conn-dot').style.background = 'var(--green)';
    console.log('[ws] connected');
  };

  ws.onmessage = ({ data }) => {
    let m; try { m=JSON.parse(data); } catch { return; }

    switch(m.type) {
      case 'init':
        clearAll();
        (m.strokes||[]).forEach(s => renderStroke(s, activeCtx()));
        document.getElementById('word-display').textContent = `${m.players} player${m.players!==1?'s':''}`;
        if (m.board) { updatePlayerList(m.board); updateLeaderboard(m.board); }
        break;

      case 'draw':
        renderStroke(m.stroke, activeCtx());
        break;

      case 'clear':
        clearAll();
        getStack(activeLayer(), undoStacks).length = 0;
        getStack(activeLayer(), redoStacks).length = 0;
        break;

      case 'snapshot': {
        const img = new Image();
        img.onload = () => { clearAll(); activeCtx().drawImage(img,0,0,CW,CH); };
        img.src = m.data;
        break;
      }

      case 'role':
        clearAll();
        savedStrokes = [];
        setRole(m.role, m.role==='drawer' ? m.word : m.hint, m.round);
        break;

      case 'hint':
        document.getElementById('word-display').textContent = m.hint;
        addChat('sys', `💡 Hint: ${m.hint}`);
        showToast('💡 Hint revealed!');
        sfxHint();
        break;

      case 'word_skipped':
        document.getElementById('word-display').textContent = m.hint;
        addChat('sys', 'Word skipped!');
        clearAll();
        break;

      case 'guess':
        addChat(m.correct?'ok':'', `<span class="cn">${m.name}:</span> ${m.text}${m.correct?' ✅':''}`);
        if (m.correct) { showToast(`🎉 ${m.name} guessed it!`, 'ok'); sfxCorrectGuess(); }
        break;

      case 'score_update':
        addChat('ok', `🏆 ${m.name} +${m.pts}pts${m.timeBonus?(' ⚡+'+m.timeBonus):''}  `);
        if (m.board) { updatePlayerList(m.board); updateLeaderboard(m.board); }
        break;

      case 'round_end':
        stopTimer();
        sfxRoundEnd();
        savedStrokes = [...(m.strokes||[])];
        showResult(
          m.guesser ? '🎉' : (m.reason==='timeout'?'⏰':'😮'),
          m.guesser ? `${m.guesser} got it!` : (m.reason==='timeout'?'Time\'s up!':'Round over'),
          m.word,
          m.guesser ? `Artist: ${m.drawerName}` : `The word was: ${m.word}`
        );
        if (m.board) { updatePlayerList(m.board); updateLeaderboard(m.board); }
        // Auto-save to gallery when round ends
        if (m.word && m.drawerName) saveToGallery(m.word, m.drawerName);
        break;

      case 'leaderboard':
        if (m.board) { updatePlayerList(m.board); updateLeaderboard(m.board); }
        break;

      case 'status':
        document.getElementById('word-display').textContent = m.message;
        addChat('sys', m.message);
        break;

      case 'player_joined':
        addChat('sys', `${m.name} joined (${m.count} players)`);
        sfxPlayerJoin();
        break;
      case 'player_left':
        addChat('sys', `${m.name} left (${m.count} players)`);
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById('conn-dot').style.background = 'var(--red)';
    setTimeout(connect, 2500);
  };
  ws.onerror = () => ws.close();
}

// ── Auto-join (Telegram Mini App) ─────────────────────────────────────────────
function getAutoJoinData() {
  const usp = new URLSearchParams(location.search);
  let roomId = '';
  if (tg) {
    const sp = tg.initDataUnsafe?.start_param;
    if (sp) roomId = decodeURIComponent(sp);
  }
  if (!roomId) roomId = usp.get('room') || '';
  if (!roomId) roomId = usp.get('startapp') || '';
  if (roomId) try { roomId = decodeURIComponent(roomId); } catch {}

  let playerName = '';
  if (tg) {
    const u = tg.initDataUnsafe?.user;
    if (u) playerName = [u.first_name,u.last_name].filter(Boolean).join(' ')||u.username||'';
  }
  if (!playerName) playerName = `Player${Math.floor(Math.random()*1000)}`;
  return { roomId, playerName };
}

function doJoin(roomId, playerName) {
  myName = playerName; myRoom = roomId;
  document.getElementById('join-overlay').style.display = 'none';
  initCanvases();
  renderPalette();
  connect();
}

(function tryAutoJoin(attempt) {
  const { roomId, playerName } = getAutoJoinData();
  if (roomId) { doJoin(roomId, playerName); return; }
  if (attempt < 10) { setTimeout(()=>tryAutoJoin(attempt+1), 100); return; }
  // Show manual join
  const { playerName:name } = getAutoJoinData();
  document.getElementById('name-in').value = name;
})(0);

// Manual join
document.getElementById('join-btn').addEventListener('click', () => {
  const name   = document.getElementById('name-in').value.trim() || `Player${Math.floor(Math.random()*1000)}`;
  const roomId = document.getElementById('room-in').value.trim() || 'default';
  doJoin(roomId, name);
});
document.getElementById('name-in').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('room-in').focus(); });
document.getElementById('room-in').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('join-btn').click(); });

// ── Sound effects (Web Audio API — no external files needed) ─────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, duration, vol=0.18, fadeOut=true) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    if (fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function sfxCorrectGuess() {
  // Ascending happy chord
  [523, 659, 784].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.4,0.15), i*80));
}

function sfxRoundStart() {
  playTone(440, 'triangle', 0.15, 0.1);
  setTimeout(() => playTone(660, 'triangle', 0.2, 0.12), 120);
}

function sfxRoundEnd() {
  [392, 349, 294].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.35,0.12), i*100));
}

function sfxHint() {
  playTone(880, 'sine', 0.12, 0.08);
}

function sfxPlayerJoin() {
  playTone(600, 'sine', 0.1, 0.06);
}

// ── Theme: light / dark ───────────────────────────────────────────────────────
let isDark = true;

function applyTheme(dark) {
  isDark = dark;
  const r = document.documentElement.style;
  if (dark) {
    r.setProperty('--bg',      '#0f0f13');
    r.setProperty('--surface', '#18181f');
    r.setProperty('--surface2','#22222c');
    r.setProperty('--surface3','#2a2a38');
    r.setProperty('--border',  '#33334a');
    r.setProperty('--text',    '#eeeef5');
    r.setProperty('--text2',   '#8888aa');
    document.getElementById('btn-theme').textContent = '☀️';
  } else {
    r.setProperty('--bg',      '#f0f0f5');
    r.setProperty('--surface', '#ffffff');
    r.setProperty('--surface2','#f5f5fa');
    r.setProperty('--surface3','#ebebf5');
    r.setProperty('--border',  '#ccccdd');
    r.setProperty('--text',    '#111120');
    r.setProperty('--text2',   '#666688');
    document.getElementById('btn-theme').textContent = '🌙';
  }
  localStorage.setItem('theme', dark?'dark':'light');
}

// Load saved theme
applyTheme(localStorage.getItem('theme') !== 'light');

// ── Gallery: save drawings locally ───────────────────────────────────────────
const GALLERY_KEY = 'drawguess_gallery';

function saveToGallery(word, drawerName) {
  try {
    // Merge all layers onto a temp canvas
    const temp = document.createElement('canvas');
    temp.width = CW; temp.height = CH;
    const tctx = temp.getContext('2d');
    tctx.fillStyle = '#fff'; tctx.fillRect(0,0,CW,CH);
    layers.forEach(l => { if(l.visible) tctx.drawImage(l.canvas,0,0); });
    const dataUrl = temp.toDataURL('image/png');

    const gallery = JSON.parse(localStorage.getItem(GALLERY_KEY)||'[]');
    gallery.unshift({
      word, drawerName,
      date: new Date().toISOString(),
      img:  dataUrl,
    });
    // Keep last 20
    localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery.slice(0,20)));
    console.log('[gallery] Saved drawing:', word);
  } catch(e) { console.warn('[gallery] Save failed:', e.message); }
}

function openGallery() {
  const gallery = JSON.parse(localStorage.getItem(GALLERY_KEY)||'[]');
  if (!gallery.length) { showToast('Gallery is empty', 'warn'); return; }

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;overflow-y:auto;padding:20px;backdrop-filter:blur(8px)';
  overlay.innerHTML = `
    <div style="max-width:600px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="font-family:Syne,sans-serif;color:var(--accent)">🖼 Gallery</h2>
        <button id="gallery-close" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer">✕ Close</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
        ${gallery.map(g=>`
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">
            <img src="${g.img}" style="width:100%;display:block"/>
            <div style="padding:6px 8px">
              <div style="font-weight:700;font-size:.8rem;color:var(--accent)">${g.word}</div>
              <div style="font-size:.72rem;color:var(--text2)">${g.drawerName} · ${new Date(g.date).toLocaleDateString()}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('gallery-close').addEventListener('click', () => overlay.remove());
}

})();
</script>
